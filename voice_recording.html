<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ứng Dụng Ghi Âm Trực Tuyến</title>
    <style>
        :root {
            --primary: #ff4757;
            --primary-hover: #ff6b81;
            --success: #01a6f3;
            --success-hover: #1378f3;
            --bg-gradient: linear-gradient(135deg, #18acf1 0%, #9ecefa 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-gradient);
            padding: 20px;
        }

        .recorder-container {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            width: 100%;
            max-width: 450px;
            text-align: center;
            transition: all 0.3s ease;
        }

        h1 {
            color: #2c3e50;
            font-size: 1.8rem;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .status {
            color: #57606f;
            font-size: 0.95rem;
            margin-bottom: 30px;
            height: 20px;
            font-weight: 500;
        }

        /* Hiệu ứng sóng âm khi ghi âm */
        .visualizer-container {
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            margin-bottom: 30px;
        }

        .bar {
            width: 4px;
            height: 8px;
            background-color: var(--primary);
            border-radius: 4px;
            transition: transform 0.2s ease;
            animation: none;
        }

        .recording .bar {
            animation: bounce 0.8s ease-in-out infinite alternate;
        }

        /* Tạo độ trễ cho từng cột sóng để nhìn tự nhiên hơn */
        .recording .bar:nth-child(1) { animation-delay: 0.1s; }
        .recording .bar:nth-child(2) { animation-delay: 0.3s; }
        .recording .bar:nth-child(3) { animation-delay: 0.6s; }
        .recording .bar:nth-child(4) { animation-delay: 0.2s; }
        .recording .bar:nth-child(5) { animation-delay: 0.5s; }
        .recording .bar:nth-child(6) { animation-delay: 0.4s; }
        .recording .bar:nth-child(7) { animation-delay: 0.7s; }

        @keyframes bounce {
            0% { transform: scaleY(1); }
            100% { transform: scaleY(6); }
        }

        /* Nút bấm điều khiển */
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        button {
            border: none;
            padding: 14px 28px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        button:active {
            transform: scale(0.95);
        }

        button:disabled {
            background-color: #ced6e0 !important;
            color: #a4b0be !important;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        #startBtn {
            background-color: var(--success);
            color: white;
        }

        #startBtn:hover:not(:disabled) {
            background-color: var(--success-hover);
        }

        #stopBtn {
            background-color: var(--primary);
            color: white;
        }

        #stopBtn:hover:not(:disabled) {
            background-color: var(--primary-hover);
        }

        /* Khu vực nghe lại */
        .audio-preview {
            margin-top: 20px;
            padding-top: 25px;
            border-top: 1px solid rgba(255, 255, 255, 0.4);
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.4s ease;
            display: none;
        }

        .audio-preview.show {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        .audio-preview p {
            color: #2c3e50;
            font-weight: 600;
            margin-bottom: 15px;
            font-size: 0.95rem;
        }

        audio {
            width: 100%;
            border-radius: 50px;
            outline: none;
        }
    </style>
</head>
<body>

    <div class="recorder-container">
        <h1>Máy Ghi Âm</h1>
        <div class="status" id="statusText">Sẵn sàng ghi âm</div>

        <!-- Sóng âm trang trí -->
        <div class="visualizer-container" id="visualizer">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>

        <!-- Bộ nút điều khiển -->
        <div class="controls">
            <button id="startBtn">
                <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><circle cx="8" cy="8" r="8"/></svg>
                Bắt đầu
            </button>
            <button id="stopBtn" disabled>
                <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><rect width="12" height="12" x="2" y="2" rx="1"/></svg>
                Kết thúc
            </button>
        </div>

        <!-- Trình phát lại âm thanh -->
        <div class="audio-preview" id="previewContainer">
            <p>Nghe lại đoạn vừa ghi:</p>
            <audio id="audioPlayback" controls></audio>
        </div>
    </div>

    <script>
        let mediaRecorder;
        let audioChunks = [];

        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const statusText = document.getElementById('statusText');
        const visualizer = document.getElementById('visualizer');
        const previewContainer = document.getElementById('previewContainer');
        const audioPlayback = document.getElementById('audioPlayback');

        // Yêu cầu quyền truy cập Micro và thiết lập bộ ghi âm
        startBtn.addEventListener('click', async () => {
            audioChunks = []; 
            
            try {
                // Xin quyền micro từ người dùng
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                mediaRecorder = new MediaRecorder(stream);
                
                mediaRecorder.ondataavailable = event => {
                    audioChunks.push(event.data);
                };

                mediaRecorder.onstop = () => {
                    // Chuyển dữ liệu ghi âm thành một URL để có thể nghe lại
                    const audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
                    const audioUrl = URL.createObjectURL(audioBlob);
                    audioPlayback.src = audioUrl;
                    
                    // Hiển thị khung nghe lại
                    previewContainer.classList.add('show');
                    
                    // Tắt luồng micro để bảo mật (đèn báo mic trên trình duyệt sẽ tắt)
                    stream.getTracks().forEach(track => track.stop());
                };

                // Bắt đầu ghi
                mediaRecorder.start();
                
                // Cập nhật giao diện
                statusText.innerText = "Đang ghi âm... nói đi nào!";
                statusText.style.color = "#ff4757";
                visualizer.classList.add('recording');
                startBtn.disabled = true;
                stopBtn.disabled = false;

            } catch (err) {
                console.error("Lỗi truy cập Micro:", err);
                statusText.innerText = "Không thể truy cập Micro. Vui lòng cấp quyền!";
                statusText.style.color = "#ff4757";
            }
        });

        // Dừng ghi âm
        stopBtn.addEventListener('click', () => {
            if (mediaRecorder && mediaRecorder.state !== "inactive") {
                mediaRecorder.stop();
                
                // Cập nhật giao diện
                statusText.innerText = "Đã ghi xong!";
                statusText.style.color = "#2ed573";
                visualizer.classList.remove('recording');
                startBtn.disabled = false;
                stopBtn.disabled = true;
            }
        });
    </script>
</body>
</html>
