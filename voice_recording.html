<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ứng Dụng Ghi Âm Trực Tuyến</title>
    <script src="wavesurfer.min.js"></script>
    <style>
        :root {
            --primary: #ff4757;
            --primary-hover: #ff6b81;
            --success: #01a6f3;
            --success-hover: #1378f3;
            --bg-gradient: linear-gradient(135deg, #18acf1 0%, #9ecefa 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-gradient);
            padding: 20px;
        }

        .recorder-container {
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            width: 100%;
            max-width: 500px;
            text-align: center;
            transition: all 0.3s ease;
        }

        h1 {
            color: #2c3e50;
            font-size: 1.8rem;
            margin-bottom: 10px;
            font-weight: 600;
        }

        /* Đã fix lỗi đè chữ: Bỏ height: 20px, cho phép tự động giãn theo nội dung */
        .status {
            color: #57606f;
            font-size: 0.95rem;
            margin-bottom: 15px;
            min-height: 24px; 
            font-weight: 500;
            line-height: 1.5;
            padding: 0 10px;
        }

        /* Đồng hồ hiển thị thời gian ghi âm */
        #recordingTime {
            font-size: 1.6rem;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 20px;
            font-family: 'Courier New', Courier, monospace;
            display: none; 
        }

        /* Biểu đồ cuộn */
        .live-visualizer {
            width: 100%;
            height: 60px;
            margin-bottom: 10px;
            border-radius: 10px;
            background-color: rgba(0, 0, 0, 0.03);
            display: none; 
        }

        /* Biểu đồ đường thẳng dao động */
        #oscilloscopeCanvas {
            height: 50px;
            margin-bottom: 30px;
            background-color: transparent; 
        }

        .live-visualizer.active {
            display: block;
        }

        /* Bộ nút điều khiển khi thu âm */
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            margin-top: 10px; /* Thêm khoảng cách an toàn với phía trên */
        }

        button {
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        button:active {
            transform: scale(0.95);
        }

        button:disabled {
            background-color: #ced6e0 !important;
            color: #a4b0be !important;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        #startBtn {
            background-color: var(--success);
            color: white;
        }

        #startBtn:hover:not(:disabled) {
            background-color: var(--success-hover);
        }

        #stopBtn {
            background-color: var(--primary);
            color: white;
        }

        #stopBtn:hover:not(:disabled) {
            background-color: var(--primary-hover);
        }

        /* Hiệu ứng nhấp nháy cho icon Micro */
        .icon-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 16px;
            height: 16px;
        }

        .icon-wrapper svg {
            position: relative;
            z-index: 2;
        }

        .recording-pulse .icon-wrapper::before,
        .recording-pulse .icon-wrapper::after {
            content: '';
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #fff; 
            border-radius: 50%; 
            z-index: 1;
            opacity: 0.8;
            pointer-events: none;
        }

        .recording-pulse .icon-wrapper::before {
            animation: circleWave 1.4s cubic-bezier(0.1, 0.8, 0.3, 1) infinite;
        }

        .recording-pulse .icon-wrapper::after {
            animation: circleWave 1.4s cubic-bezier(0.1, 0.8, 0.3, 1) infinite;
            animation-delay: 0.7s; 
        }

        @keyframes circleWave {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(4.5); opacity: 0; }
        }

        /* Khu vực hiển thị khi nghe lại */
        .audio-preview {
            margin-top: 10px;
            padding-top: 25px;
            border-top: 1px solid rgba(0, 0, 0, 0.1);
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.4s ease;
            display: none;
        }

        .audio-preview.show {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        .audio-preview p {
            color: #2c3e50;
            font-weight: 600;
            margin-bottom: 15px;
            font-size: 0.95rem;
        }

        #waveform {
            width: 100%;
            height: 80px;
            margin-bottom: 5px;
            border-radius: 8px;
            background-color: rgba(0,0,0,0.02);
            cursor: pointer; 
        }

        /* Thời gian nghe lại (vd: 00:05 / 01:20) */
        #playbackTime {
            text-align: right;
            font-size: 0.85rem;
            color: #57606f;
            font-weight: 600;
            font-family: 'Courier New', Courier, monospace;
            margin-bottom: 15px;
            padding-right: 5px;
        }

        /* -------------------------------------------
           BỘ CÔNG CỤ NGHE LẠI (PLAYBACK CONTROLS)
        ------------------------------------------- */
        .playback-controls {
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: #eef4f8; 
            padding: 20px 25px;
            border-radius: 16px;
        }

        .top-row {
            display: flex;
            justify-content: center;
            align-items: flex-end; 
            gap: 20px;
            flex-wrap: wrap;
        }

        .bottom-row {
            display: flex;
            justify-content: center;
        }

        #playPauseBtn {
            background-color: #2c3e50;
            color: white;
            padding: 10px 24px;
            margin: 0;
            height: 42px; 
        }
        
        #playPauseBtn:hover {
            background-color: #1a252f;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .control-group label {
            font-size: 0.85rem;
            color: #57606f;
            font-weight: 600;
        }

        .control-group select {
            cursor: pointer;
            border-radius: 6px;
            border: 1px solid #dcdde1;
            padding: 4px 10px;
            outline: none;
            background: #fff;
            color: #2c3e50;
            font-weight: 500;
            height: 30px;
        }

        .control-group input[type="range"] {
            cursor: pointer;
            accent-color: var(--success); 
            background: transparent; 
            border: none;
            padding: 0;
            margin: 0;
            width: 130px;
            height: 30px; 
            outline: none;
        }

        .download-btn {
            background-color: var(--success);
            color: white;
            text-decoration: none;
            padding: 10px 30px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.95rem;
            box-shadow: 0 4px 15px rgba(1, 166, 243, 0.3);
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .download-btn:hover {
            background-color: var(--success-hover);
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="recorder-container">
        <h1>Máy Ghi Âm</h1>
        
        <div class="status" id="statusText">Sẵn sàng ghi âm</div>
        
        <div id="recordingTime">00:00</div>

        <canvas id="liveCanvas" class="live-visualizer" width="400" height="60"></canvas>
        <canvas id="oscilloscopeCanvas" class="live-visualizer" width="400" height="50"></canvas>

        <div class="controls">
            <button id="startBtn">
                <span class="icon-wrapper">
                    <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><circle cx="8" cy="8" r="8"/></svg>
                </span>
                Bắt đầu
            </button>
            <button id="stopBtn" disabled>
                <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><rect width="12" height="12" x="2" y="2" rx="1"/></svg>
                Kết thúc
            </button>
        </div>

        <div class="audio-preview" id="previewContainer">
            <p>Nghe lại đoạn vừa ghi:</p>
            <div id="waveform"></div>
            <div id="playbackTime">00:00 / 00:00</div>
            
            <div class="playback-controls">
                
                <div class="top-row">
                    <button id="playPauseBtn">
                        <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                            <path d="M11.596 8.697l-6.363 3.692c-.54.313-1.233-.066-1.233-.697V4.308c0-.63.692-1.01 1.233-.696l6.363 3.692a.802.802 0 0 1 0 1.393z"/>
                        </svg>
                        Phát/Dừng
                    </button>

                    <div class="control-group">
                        <label>Tốc độ</label>
                        <select id="speedSelect">
                            <option value="0.25">0.5x</option>
                            <option value="0.5">0.75x</option>
                            <option value="1" selected>1.0x</option>
                            <option value="1.5">1.5x</option>
                            <option value="2">2.0x</option>
                        </select>
                    </div>

                    <div class="control-group">
                        <label>Âm lượng</label>
                        <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="1">
                    </div>
                </div>

                <div class="bottom-row">
                    <a id="downloadBtn" class="download-btn" download="recording.mp3">
                        <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                            <path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/>
                            <path d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708l3 3z"/>
                        </svg>
                        Tải về
                    </a>
                </div>

            </div>
        </div>
    </div>

    <script>
        let mediaRecorder;
        let audioChunks = [];
        let currentStream = null;
        let audioCtx;
        let analyser;
        let animationId;

        /* --- BIẾN CHO TÍNH NĂNG ĐẾM THỜI GIAN --- */
        let recordingInterval;
        let recordingSeconds = 0;

        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const statusText = document.getElementById('statusText');
        const previewContainer = document.getElementById('previewContainer');
        const liveCanvas = document.getElementById('liveCanvas');
        const canvasCtx = liveCanvas.getContext('2d');
        const oscCanvas = document.getElementById('oscilloscopeCanvas');
        const oscCtx = oscCanvas.getContext('2d');
        
        const playPauseBtn = document.getElementById('playPauseBtn');
        const speedSelect = document.getElementById('speedSelect');
        const volumeSlider = document.getElementById('volumeSlider');
        const downloadBtn = document.getElementById('downloadBtn');
        const waveformEl = document.getElementById('waveform'); 
        
        const recordingTimeEl = document.getElementById('recordingTime');
        const playbackTimeEl = document.getElementById('playbackTime');

        const barWidth = 4;
        const gap = 2;
        const maxBars = Math.floor(liveCanvas.width / (barWidth + gap));
        let volumeHistory = []; 
        let frameCounter = 0;

        const wavesurfer = WaveSurfer.create({
            container: '#waveform',
            waveColor: '#ced6e0',
            progressColor: '#ff4757', 
            barWidth: 3,              
            barGap: 2,                
            barRadius: 3,             
            height: 80,
            cursorWidth: 2,
            cursorColor: '#2f3542',
            interact: true, 
            dragToSeek: true 
        });

        /* --- HÀM ĐỊNH DẠNG THỜI GIAN (GIÂY -> MM:SS) --- */
        function formatTime(seconds) {
            if (isNaN(seconds)) return "00:00";
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return (m < 10 ? '0' + m : m) + ':' + (s < 10 ? '0' + s : s);
        }

        /* --- CẬP NHẬT THỜI GIAN NGHE LẠI --- */
        wavesurfer.on('ready', () => {
            const total = wavesurfer.getDuration();
            playbackTimeEl.innerText = `00:00 / ${formatTime(total)}`;
        });

        wavesurfer.on('timeupdate', (currentTime) => {
            const total = wavesurfer.getDuration();
            playbackTimeEl.innerText = `${formatTime(currentTime)} / ${formatTime(total)}`;
        });

        /* --- XỬ LÝ KÉO THẢ TỜI NHẠC MƯỢT MÀ --- */
        let isPlayingBeforeDrag = false;

        waveformEl.addEventListener('pointerdown', () => {
            if (wavesurfer.isPlaying()) {
                isPlayingBeforeDrag = true;
                wavesurfer.pause(); 
            } else {
                isPlayingBeforeDrag = false;
            }
        });

        window.addEventListener('pointerup', () => {
            if (isPlayingBeforeDrag) {
                wavesurfer.play();
                isPlayingBeforeDrag = false; 
            }
        });
        /* -------------------------------------- */

        wavesurfer.on('finish', () => wavesurfer.stop());
        playPauseBtn.addEventListener('click', () => wavesurfer.playPause());

        volumeSlider.addEventListener('input', (e) => {
            wavesurfer.setVolume(Number(e.target.value));
        });

        speedSelect.addEventListener('change', (e) => {
            wavesurfer.setPlaybackRate(Number(e.target.value));
        });

        function drawLiveWaveform() {
            animationId = requestAnimationFrame(drawLiveWaveform);

            const bufferLength = analyser.fftSize;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteTimeDomainData(dataArray);

            let currentMax = 0;
            for (let i = 0; i < bufferLength; i++) {
                let v = Math.abs(dataArray[i] - 128);
                if (v > currentMax) currentMax = v;
            }

            frameCounter++;
            if (frameCounter >= 2) {
                frameCounter = 0;
                let normalized = currentMax / 50; 
                if (normalized > 1) normalized = 1; 
                if (normalized < 0.05) normalized = 0; 

                let h = normalized * liveCanvas.height * 0.85;
                if (h < 3) h = 3; 

                volumeHistory.push(h);
                if (volumeHistory.length > maxBars) volumeHistory.shift();
            }

            canvasCtx.clearRect(0, 0, liveCanvas.width, liveCanvas.height);
            let x = 0;
            for (let i = 0; i < maxBars; i++) {
                let h = volumeHistory[i] || 3; 
                const y = (liveCanvas.height / 2) - (h / 2); 
                
                canvasCtx.fillStyle = '#01a6f3';
                if (canvasCtx.roundRect) {
                    canvasCtx.beginPath();
                    canvasCtx.roundRect(x, y, barWidth, h, 2);
                    canvasCtx.fill();
                } else {
                    canvasCtx.fillRect(x, y, barWidth, h);
                }
                x += barWidth + gap;
            }

            oscCtx.clearRect(0, 0, oscCanvas.width, oscCanvas.height);
            oscCtx.lineWidth = 2.5;
            oscCtx.strokeStyle = '#ff4757';
            oscCtx.lineJoin = 'round';
            oscCtx.lineCap = 'round';
            oscCtx.beginPath();

            let sliceWidth = oscCanvas.width * 1.0 / bufferLength;
            let oscX = 0;

            for (let i = 0; i < bufferLength; i++) {
                let v = (dataArray[i] - 128) / 128.0; 
                let y = (oscCanvas.height / 2) - (v * (oscCanvas.height / 2));

                if (i === 0) {
                    oscCtx.moveTo(oscX, y);
                } else {
                    oscCtx.lineTo(oscX, y);
                }
                oscX += sliceWidth;
            }
            
            oscCtx.lineTo(oscCanvas.width, oscCanvas.height / 2);
            oscCtx.stroke();
        }

        // BẮT ĐẦU GHI ÂM
        startBtn.addEventListener('click', async () => {
            audioChunks = []; 
            previewContainer.classList.remove('show'); 
            wavesurfer.empty(); 
            
            volumeSlider.value = 1;
            speedSelect.value = "1";
            wavesurfer.setVolume(1);
            wavesurfer.setPlaybackRate(1);

            volumeHistory = new Array(maxBars).fill(3); 
            
            try {
                currentStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 2048; 
                
                const source = audioCtx.createMediaStreamSource(currentStream);
                source.connect(analyser);

                liveCanvas.classList.add('active');
                oscCanvas.classList.add('active');
                drawLiveWaveform();

                mediaRecorder = new MediaRecorder(currentStream);
                mediaRecorder.ondataavailable = event => audioChunks.push(event.data);

                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
                    const audioUrl = URL.createObjectURL(audioBlob);
                    
                    wavesurfer.load(audioUrl);
                    downloadBtn.href = audioUrl;

                    previewContainer.classList.add('show');
                    
                    if (currentStream) {
                        currentStream.getTracks().forEach(track => track.stop());
                    }
                };

                mediaRecorder.start();
                
                statusText.innerText = "Đang ghi âm...";
                statusText.style.color = "#ff4757";
                startBtn.classList.add('recording-pulse');
                startBtn.style.pointerEvents = 'none'; 
                stopBtn.disabled = false;

                // Khởi động đồng hồ đếm thời gian
                recordingSeconds = 0;
                recordingTimeEl.style.display = 'block';
                recordingTimeEl.innerText = "00:00";
                clearInterval(recordingInterval);
                recordingInterval = setInterval(() => {
                    recordingSeconds++;
                    recordingTimeEl.innerText = formatTime(recordingSeconds);
                }, 1000);

            } catch (err) {
                console.error("Lỗi truy cập Micro:", err);
                statusText.innerText = "Không thể truy cập Micro. Vui lòng cấp quyền!";
                statusText.style.color = "#ff4757";
            }
        });

        // DỪNG GHI ÂM
        stopBtn.addEventListener('click', () => {
            if (mediaRecorder && mediaRecorder.state !== "inactive") {
                mediaRecorder.stop();
                
                // Dừng đồng hồ
                clearInterval(recordingInterval);
                recordingTimeEl.style.display = 'none';

                cancelAnimationFrame(animationId);
                liveCanvas.classList.remove('active');
                oscCanvas.classList.remove('active');
                if(audioCtx && audioCtx.state !== 'closed') audioCtx.close();

                statusText.innerText = "Đã ghi xong! Bạn có thể tùy chỉnh và tải về bên dưới.";
                statusText.style.color = "#01a6f3";
                
                startBtn.classList.remove('recording-pulse');
                startBtn.style.pointerEvents = 'auto';
                stopBtn.disabled = true;
            }
        });
    </script>
</body>
</html>
