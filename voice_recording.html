<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ứng Dụng Ghi Âm Trực Tuyến</title>
    <style>
        :root {
            --primary: #ff4757;
            --primary-hover: #ff6b81;
            --success: #01a6f3;
            --success-hover: #1378f3;
            --bg-gradient: linear-gradient(135deg, #18acf1 0%, #9ecefa 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-gradient);
            padding: 20px;
        }

        .recorder-container {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            width: 100%;
            max-width: 450px;
            text-align: center;
            transition: all 0.3s ease;
        }

        h1 {
            color: #2c3e50;
            font-size: 1.8rem;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .status {
            color: #57606f;
            font-size: 0.95rem;
            margin-bottom: 40px;
            height: 20px;
            font-weight: 500;
        }

        /* Bộ nút điều khiển */
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        button {
            border: none;
            padding: 14px 28px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        button:active {
            transform: scale(0.95);
        }

        button:disabled {
            background-color: #ced6e0 !important;
            color: #a4b0be !important;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        #startBtn {
            background-color: var(--success);
            color: white;
        }

        #startBtn:hover:not(:disabled) {
            background-color: var(--success-hover);
        }

        #stopBtn {
            background-color: var(--primary);
            color: white;
        }

        #stopBtn:hover:not(:disabled) {
            background-color: var(--primary-hover);
        }

        /* -------------------------------------------
           THIẾT LẬP ĐỂ SÓNG LAN TỪ ICON TRÒN BÊN TRONG
        ------------------------------------------- */
        .icon-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 16px;
            height: 16px;
        }

        .icon-wrapper svg {
            position: relative;
            z-index: 2; /* Đảm bảo icon gốc luôn nằm trên cùng */
        }

        /* Tạo 2 lớp sóng tròn ẩn phía sau icon */
        .recording-pulse .icon-wrapper::before,
        .recording-pulse .icon-wrapper::after {
            content: '';
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #fff; 
            border-radius: 50%; 
            z-index: 1;
            opacity: 0.8;
            pointer-events: none;
        }

        /* Kích hoạt animation khi bắt đầu ghi âm */
        .recording-pulse .icon-wrapper::before {
            animation: circleWave 1.4s cubic-bezier(0.1, 0.8, 0.3, 1) infinite;
        }

        .recording-pulse .icon-wrapper::after {
            animation: circleWave 1.4s cubic-bezier(0.1, 0.8, 0.3, 1) infinite;
            animation-delay: 0.7s; /* Lệch pha để tạo sóng gối đuôi mượt hơn */
        }

        /* Khung chuyển động: Phóng to hình tròn và mờ dần */
        @keyframes circleWave {
            0% {
                transform: scale(1);
                opacity: 0.8;
            }
            100% {
                transform: scale(4.5); /* Độ rộng của vòng sóng tròn */
                opacity: 0;
            }
        }
        /* ------------------------------------------- */

        /* Khu vực nghe lại */
        .audio-preview {
            margin-top: 20px;
            padding-top: 25px;
            border-top: 1px solid rgba(255, 255, 255, 0.4);
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.4s ease;
            display: none;
        }

        .audio-preview.show {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        .audio-preview p {
            color: #2c3e50;
            font-weight: 600;
            margin-bottom: 15px;
            font-size: 0.95rem;
        }

        audio {
            width: 100%;
            border-radius: 50px;
            outline: none;
        }
    </style>
</head>
<body>

    <div class="recorder-container">
        <h1>Máy Ghi Âm</h1>
        <div class="status" id="statusText">Sẵn sàng ghi âm</div>

        <!-- Bộ nút điều khiển -->
        <div class="controls">
            <button id="startBtn">
                <!-- Bọc SVG trong một class wrapper để định vị tâm vòng tròn -->
                <span class="icon-wrapper">
                    <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><circle cx="8" cy="8" r="8"/></svg>
                </span>
                Bắt đầu
            </button>
            <button id="stopBtn" disabled>
                <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><rect width="12" height="12" x="2" y="2" rx="1"/></svg>
                Kết thúc
            </button>
        </div>

        <!-- Trình phát lại âm thanh -->
        <div class="audio-preview" id="previewContainer">
            <p>Nghe lại đoạn vừa ghi:</p>
            <audio id="audioPlayback" controls></audio>
        </div>
    </div>

    <script>
        let mediaRecorder;
        let audioChunks = [];
        let currentStream = null;

        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const statusText = document.getElementById('statusText');
        const previewContainer = document.getElementById('previewContainer');
        const audioPlayback = document.getElementById('audioPlayback');

        // Yêu cầu quyền truy cập Micro và thiết lập bộ ghi âm
        startBtn.addEventListener('click', async () => {
            audioChunks = []; 
            
            try {
                currentStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(currentStream);
                
                mediaRecorder.ondataavailable = event => {
                    audioChunks.push(event.data);
                };

                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
                    const audioUrl = URL.createObjectURL(audioBlob);
                    audioPlayback.src = audioUrl;
                    
                    previewContainer.classList.add('show');
                    
                    if (currentStream) {
                        currentStream.getTracks().forEach(track => track.stop());
                    }
                };

                mediaRecorder.start();
                
                // Cập nhật giao diện khi đang ghi âm
                statusText.innerText = "Đang ghi âm... nói đi nào!";
                statusText.style.color = "#ff4757";
                
                // Kích hoạt class hiệu ứng sóng tròn tại Icon
                startBtn.classList.add('recording-pulse');
                
                // Khóa bấm nhưng giữ hiệu ứng hoạt động
                startBtn.style.pointerEvents = 'none'; 
                stopBtn.disabled = false;

            } catch (err) {
                console.error("Lỗi truy cập Micro:", err);
                statusText.innerText = "Không thể truy cập Micro. Vui lòng cấp quyền!";
                statusText.style.color = "#ff4757";
            }
        });

        // Dừng ghi âm
        stopBtn.addEventListener('click', () => {
            if (mediaRecorder && mediaRecorder.state !== "inactive") {
                mediaRecorder.stop();
                
                // Cập nhật giao diện sau khi dừng
                statusText.innerText = "Đã ghi xong!";
                statusText.style.color = "#2ed573";
                
                // Hủy bỏ hiệu ứng và mở khóa nút
                startBtn.classList.remove('recording-pulse');
                startBtn.style.pointerEvents = 'auto';
                
                stopBtn.disabled = true;
            }
        });
    </script>
</body>
</html>
