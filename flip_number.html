<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flip Number</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #board {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .row {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .word-group, .number-group {
            display: flex;
            gap: 4px;
        }

        /* Khối cơ bản cho từng ô chữ/số */
        .split-flap {
            position: relative;
            width: 40px;
            height: 60px;
            border-radius: 4px;
            font-size: 36px;
            font-weight: bold;
            perspective: 1000px; /* Tạo hiệu ứng 3D khi lật */
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
            background-color: #161b22;
        }

        /* Nửa trên và nửa dưới chung */
        .half {
            position: absolute;
            width: 100%;
            height: 50%;
            background-color: #21262d;
            overflow: hidden;
            display: flex;
            justify-content: center;
            color: #58a6ff;
        }

        .half span {
            position: absolute;
            height: 60px;
            line-height: 60px;
        }

        /* Nửa trên */
        .top {
            top: 0;
            border-bottom-left-radius: 0;
            border-bottom-right-radius: 0;
            border-bottom: 1px solid #000; /* Khoảng cách nhỏ giữa 2 nửa */
            border-top-left-radius: 4px;
            border-top-right-radius: 4px;
        }

        .top span { top: 0; }

        /* Nửa dưới */
        .bottom {
            bottom: 0;
            border-top-left-radius: 0;
            border-top-right-radius: 0;
            border-top: 1px solid #0d1117; /* Khoảng cách nhỏ giữa 2 nửa */
            border-bottom-left-radius: 4px;
            border-bottom-right-radius: 4px;
        }

        .bottom span { bottom: 0; }

        /* Các miếng lật animation */
        .flap-top, .flap-bottom {
            z-index: 10;
        }

        .flap-top {
            transform-origin: bottom;
            animation: flipDown 0.25s ease-in forwards;
        }

        .flap-bottom {
            transform-origin: top;
            transform: rotateX(90deg);
            animation: flipUp 0.25s ease-out 0.25s forwards;
        }

        @keyframes flipDown {
            0% { transform: rotateX(0deg); }
            100% { transform: rotateX(-90deg); }
        }

        @keyframes flipUp {
            0% { transform: rotateX(90deg); }
            100% { transform: rotateX(0deg); }
        }
        
        .static-text .half { color: #8b949e; }
    </style>
</head>
<body>

    <div id="board"></div>

    <script>
        const words = ["USER", "SERVICE", "DEPLOYMENT", "REQUEST", "LOG"];
        const board = document.getElementById("board");
        
        // Quản lý trạng thái các bộ đếm số cho 5 dòng
        const counters = [995, 850, 100, 9995, 0]; 
        const numberElements = []; // Lưu trữ các DOM elements của số để update

        // Hàm tạo HTML cho 1 ô (Split-flap)
        function createFlap(char, isStatic = false) {
            const flap = document.createElement('div');
            flap.className = `split-flap ${isStatic ? 'static-text' : ''}`;
            flap.dataset.char = char;

            flap.innerHTML = `
                <div class="half top"><span>${char}</span></div>
                <div class="half bottom"><span>${char}</span></div>
            `;
            return flap;
        }

        // Khởi tạo bảng
        function initBoard() {
            words.forEach((word, rowIndex) => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'row';

                // 1. Render nhóm chữ cố định
                const wordGroup = document.createElement('div');
                wordGroup.className = 'word-group';
                for (let char of word) {
                    wordGroup.appendChild(createFlap(char, true));
                }
                rowDiv.appendChild(wordGroup);

                // 2. Render nhóm số có thể lật (định dạng 6 chữ số)
                const numberGroup = document.createElement('div');
                numberGroup.className = 'number-group';
                
                const initialNumStr = counters[rowIndex].toString().padStart(6, '0');
                const rowDigits = [];
                for (let char of initialNumStr) {
                    const digitFlap = createFlap(char);
                    numberGroup.appendChild(digitFlap);
                    rowDigits.push(digitFlap);
                }
                
                numberElements.push(rowDigits);
                rowDiv.appendChild(numberGroup);
                board.appendChild(rowDiv);
            });
        }

        // Hàm xử lý lật cho 1 ô số
        function triggerFlip(flapDOM, oldChar, newChar) {
            if (oldChar === newChar) return;

            flapDOM.dataset.char = newChar;

            // Tạo tấm thẻ lật xuống
            const flapTop = document.createElement('div');
            flapTop.className = 'half top flap-top';
            flapTop.innerHTML = `<span>${oldChar}</span>`;

            const flapBottom = document.createElement('div');
            flapBottom.className = 'half bottom flap-bottom';
            flapBottom.innerHTML = `<span>${newChar}</span>`;

            flapDOM.appendChild(flapTop);
            flapDOM.appendChild(flapBottom);

            // Cập nhật thẻ gốc bên dưới sau khi lật (0.5s animation tổng cộng)
            setTimeout(() => {
                flapDOM.querySelector('.top span').innerText = newChar;
                flapDOM.querySelector('.bottom span').innerText = newChar;
                
                // Dọn dẹp DOM elements animation
                flapTop.remove();
                flapBottom.remove();
            }, 500);
        }

        // Vòng lặp cập nhật số mỗi 0.5 giây
        function updateCounters() {
            for (let i = 0; i < counters.length; i++) {
                const oldStr = counters[i].toString().padStart(6, '0');
                counters[i]++; // Tăng 1 đơn vị
                const newStr = counters[i].toString().padStart(6, '0');

                // So sánh từng chữ số, nếu khác nhau thì kích hoạt hiệu ứng lật
                for (let j = 0; j < 6; j++) {
                    if (oldStr[j] !== newStr[j]) {
                        triggerFlip(numberElements[i][j], oldStr[j], newStr[j]);
                    }
                }
            }
        }

        // Chạy chương trình
        initBoard();
        setInterval(updateCounters, 500); // 500ms = 0.5s như yêu cầu
    </script>
</body>
</html>
