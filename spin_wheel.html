<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spin Wheel</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #333;
        }

        .controls {
            margin-bottom: 30px;
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
            width: 200px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            background-color: #007bff;
            color: white;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #0056b3;
        }

        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        .wheel-container {
            position: relative;
            margin-top: 30px;
        }

        canvas {
            background-color: transparent;
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
        }

        .pointer {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #ff3333;
            z-index: 10;
        }

        .spin-btn {
            margin-top: 30px;
            background-color: #ff9800;
            font-size: 22px;
            font-weight: bold;
            padding: 18px 40px;
        }

        .spin-btn:hover {
            background-color: #ff6c03;
        }

        .status-result {
            margin-top: 25px;
            font-size: 30px;
            font-weight: bold;
            color: #ff9800;
            padding: 10px 20px;
            max-width: 90%;
            text-align: center;
            word-wrap: break-word;
            word-break: break-word;
            line-height: 1.4;
        }

        .status-result span {
            display: block;
            font-size: 30px;
            color: #ff9800;
            margin-top: 0px;
        }

        @media (max-width: 768px) {
            canvas {
                width: 280px;
                height: 280px;
            }

            .pointer {
                top: -20px;
                border-left: 12px solid transparent;
                border-right: 12px solid transparent;
                border-top: 24px solid #ff3333;
            }

            .spin-btn {
                padding: 16px 30px;
                font-size: 20px;
            }

            .status-result {
                font-size: 26px;
            }

            .status-result span {
                font-size: 26px;
            }
        }
    </style>
</head>

<body>

    <h1>Vòng Quay May Mắn</h1>

    <div class="controls">
        <input type="text" id="itemName" placeholder="Nhập tên vật phẩm" onkeypress="handleKeyPress(event)">
        <button onclick="addItem()">Thêm</button>
    </div>

    <div class="wheel-container">
        <div class="pointer"></div>
        <canvas id="wheelCanvas" width="400" height="400"></canvas>
    </div>

    <button class="spin-btn" id="spinBtn" onclick="spin()">Quay Ngay</button>

    <div class="status-result" id="statusResult">Chưa có kết quả</div>

    <script>
        let items = [];
        let colors = [];
        let currentWinnerIndex = -1;

        let startAngle = 0;
        let arc = 0;
        let spinTimeout = null;
        let spinTime = 0;
        let spinTimeTotal = 0;
        let spinAngleStart = 0;

        const canvas = document.getElementById("wheelCanvas");
        const ctx = canvas.getContext("2d");
        const radius = canvas.width / 2;

        const colorPalette = [
            "#FF5733", "#33FF57", "#3357FF", "#F333FF", "#33FFF3",
            "#FFD433", "#FF8333", "#8333FF", "#33FF83", "#FF33A8",
            "#4CAF50", "#FFC107", "#00BCD4", "#E91E63", "#9C27B0"
        ];

        function getColor(index) {
            return colorPalette[index % colorPalette.length];
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') addItem();
        }

        function addItem() {
            const input = document.getElementById("itemName");
            const name = input.value.trim();
            if (name === "") return;

            items.push(name);
            colors.push(getColor(items.length - 1));
            input.value = "";
            drawWheel();
        }

        function drawWheel() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (items.length === 0) {
                // Vòng xám nền
                ctx.beginPath();
                ctx.arc(radius, radius, radius, 0, 2 * Math.PI);
                ctx.fillStyle = "#e0e0e0";
                ctx.fill();
                ctx.lineWidth = 2;
                ctx.strokeStyle = "#ccc";
                ctx.stroke();

                // Hình tròn trắng trung tâm (khi chưa có dữ liệu)
                ctx.beginPath();
                ctx.arc(radius, radius, radius * 0.45, 0, 2 * Math.PI);
                ctx.fillStyle = "#ffffff";
                ctx.fill();
                ctx.lineWidth = 2;
                ctx.strokeStyle = "#cccccc";
                ctx.stroke();

                // Text hiển thị
                ctx.fillStyle = "#666";
                ctx.font = "20px Arial";
                ctx.textAlign = "center";
                ctx.fillText("Chưa có dữ liệu", radius, radius + 7);
                return;
            }

            arc = 2 * Math.PI / items.length;

            // Vẽ các mảnh của vòng quay
            for (let i = 0; i < items.length; i++) {
                let angle = startAngle + i * arc;

                ctx.beginPath();
                ctx.arc(radius, radius, radius, angle, angle + arc, false);
                ctx.lineTo(radius, radius);
                ctx.fillStyle = colors[i];
                ctx.fill();

                ctx.lineWidth = 1.5;
                ctx.strokeStyle = colors[i];
                ctx.stroke();

                ctx.save();
                ctx.fillStyle = "#fff";
                ctx.font = "bold 18px Arial";
                ctx.shadowColor = "rgba(0,0,0,0.5)";
                ctx.shadowBlur = 4;

                ctx.translate(
                    radius + Math.cos(angle + arc / 2) * (radius * 0.6),
                    radius + Math.sin(angle + arc / 2) * (radius * 0.6)
                );
                ctx.rotate(angle + arc / 2);

                let text = items[i];
                if (text.length > 15) text = text.substring(0, 13) + '...';

                ctx.textAlign = "center";
                ctx.fillText(text, 0, 5);
                ctx.restore();
            }

            // THÊM: Hình tròn trắng ở trung tâm vòng quay (sau khi đã vẽ các mảnh)
            ctx.beginPath();
            ctx.arc(radius, radius, radius * 0.45, 0, 2 * Math.PI);
            ctx.fillStyle = "#ffffff";
            ctx.fill();
            ctx.lineWidth = 3;
            ctx.strokeStyle = "#eeeeee"; // Tạo đường viền nhạt để tách biệt đẹp mắt
            ctx.stroke();
        }

        function spin() {
            if (items.length === 0) {
                alert("Vui lòng thêm ít nhất một tên vật phẩm trước khi quay!");
                return;
            }

            document.getElementById("spinBtn").disabled = true;

            spinAngleStart = Math.random() * 10 + 20;
            spinTime = 0;
            spinTimeTotal = Math.random() * 3000 + 4000;

            rotateWheel();
        }

        function rotateWheel() {
            spinTime += 30;
            if (spinTime >= spinTimeTotal) {
                stopRotateWheel();
                return;
            }

            let spinAngle = spinAngleStart - easeOut(spinTime, 0, spinAngleStart, spinTimeTotal);
            startAngle += (spinAngle * Math.PI / 180);
            drawWheel();

            spinTimeout = requestAnimationFrame(rotateWheel);
        }

        function easeOut(t, b, c, d) {
            let ts = (t /= d) * t;
            let tc = ts * t;
            return b + c * (tc + -3 * ts + 3 * t);
        }

        function stopRotateWheel() {
            cancelAnimationFrame(spinTimeout);

            let normalizedStart = startAngle % (2 * Math.PI);
            if (normalizedStart < 0) normalizedStart += 2 * Math.PI;

            let pointerAngle = 1.5 * Math.PI;
            let relativeAngle = (pointerAngle - normalizedStart + 2 * Math.PI) % (2 * Math.PI);

            currentWinnerIndex = Math.floor(relativeAngle / arc);

            if (currentWinnerIndex >= items.length) currentWinnerIndex = 0;

            document.getElementById("statusResult").innerHTML = `<span>${items[currentWinnerIndex]}</span>`;

            items.splice(currentWinnerIndex, 1);
            colors.splice(currentWinnerIndex, 1);

            document.getElementById("spinBtn").disabled = false;

            drawWheel();
        }

        drawWheel();
    </script>

</body>

</html>
