<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Scanner</title>

<!-- <script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script> -->
<script src="jsQR.js"></script>

<style>
*{
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#ffffff;
    color:#111;
    margin:0;
    padding:20px;
    text-align:center;
}

h1{
    margin-bottom:20px;
    color:#007bff;
}

video{
    width:100%;
    max-width:500px;
    border-radius:14px;
    border:3px solid #007bff;
    background:#ffffff;
}

canvas{
    display:none;
}

textarea{
    width:100%;
    max-width:500px;
    height:130px;
    margin-top:20px;
    padding:14px;
    border-radius:12px;
    border:2px solid #007bff;
    resize:none;
    font-size:16px;
    outline:none;
    color:#111;
}

.buttons{
    margin-top:18px;
    display:flex;
    gap:12px;
    justify-content:center;
    flex-wrap:wrap;
}

button,
label{
    background:#007bff;
    color:#fff;
    border:none;
    padding:12px 20px;
    border-radius:12px;
    cursor:pointer;
    font-size:16px;
    transition:0.2s;
    font-weight:bold;
}

button:hover,
label:hover{
    background:#0062cc;
}

input[type=file]{
    display:none;
}

.status{
    margin-top:15px;
    color:#007bff;
    font-weight:bold;
}
textarea[readonly]{
    background:#f5f5f5;
    cursor:not-allowed;
}
@media (max-width:768px){

    h1{
        color:#ff8800;
    }

    video{
        border-color:#ff8800;
    }

    textarea{
        border-color:#ff8800;
    }

    button,
    label{
        background:#ff8800;
    }

    button:hover,
    label:hover{
        background:#e67600;
    }

    .status{
        color:#ff8800;
    }
}
</style>
</head>

<body>

<h1>QR Scanner</h1>

<video id="video" autoplay playsinline></video>

<canvas id="canvas"></canvas>

<div class="buttons">
    <button onclick="startCamera()">Mở Camera</button>

    <label for="fileInput">Upload Ảnh QR</label>

    <input type="file" id="fileInput" accept="image/*">

    <button onclick="copyText()">Copy Text</button>
</div>

<textarea id="result" placeholder="Kết quả QR sẽ hiện ở đây..." readonly></textarea>

<div class="status" id="status"></div>

<script>
const video=document.getElementById("video");
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
const resultBox=document.getElementById("result");
const statusText=document.getElementById("status");

let scanning=false;

async function startCamera(){

    try{

        const stream=await navigator.mediaDevices.getUserMedia({
            video:{
                facingMode:"environment"
            }
        });

        video.srcObject=stream;

        scanning=true;

        statusText.innerText="Đang quét QR bằng camera...";

        requestAnimationFrame(scanQR);

    }catch(err){

        alert("Không mở được camera: "+err);

    }
}

function scanQR(){

    if(!scanning) return;

    if(video.readyState===video.HAVE_ENOUGH_DATA){

        canvas.width=video.videoWidth;
        canvas.height=video.videoHeight;

        ctx.drawImage(video,0,0,canvas.width,canvas.height);

        const imageData=ctx.getImageData(
            0,
            0,
            canvas.width,
            canvas.height
        );

        const code=jsQR(
            imageData.data,
            imageData.width,
            imageData.height
        );

        if(code){

            resultBox.value=code.data;

            statusText.innerText="Đã quét thành công!";

        }
    }

    requestAnimationFrame(scanQR);
}

document.getElementById("fileInput").addEventListener("change",function(e){

    const file=e.target.files[0];

    if(!file) return;

    const img=new Image();

    img.onload=function(){

        canvas.width=img.width;
        canvas.height=img.height;

        ctx.drawImage(img,0,0);

        const imageData=ctx.getImageData(
            0,
            0,
            canvas.width,
            canvas.height
        );

        const code=jsQR(
            imageData.data,
            imageData.width,
            imageData.height
        );

        if(code){

            resultBox.value=code.data;

            statusText.innerText="Đã đọc QR từ ảnh!";

        }else{

            alert("Không tìm thấy QR trong ảnh");

        }
    };

    img.src=URL.createObjectURL(file);

});

function copyText(){

    resultBox.select();

    resultBox.setSelectionRange(0,99999);

    navigator.clipboard.writeText(resultBox.value);

    statusText.innerText="Đã copy!";
}
</script>

</body>
</html>
