    <style>
        :root {

            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, .08),
                0 4px 12px rgba(0, 0, 0, .3);

            transition: .2s;


        }


        textarea {
            width: 100%;
            height: 500px;

            border: none;
            outline: none;
            resize: none;

            background: #020617;

            color: white;

            padding: 30px;

            font-size: 24px;
            line-height: 1.9;

            transition: .25s;
        }

        textarea::placeholder {
            color: #64748b;
        }

        textarea:focus {
            box-shadow:
                inset 0 0 0 2px #3b82f6,
                0 0 30px rgba(59, 130, 246, .2);
        }

        .footer {
            padding: 22px;


            text-align: center;

            color: #94a3b8;

            border-top: 1px solid var(--border);

            background:
                linear-gradient(180deg,
                    transparent,
                    rgba(255, 255, 255, .02));

        }

        .footer strong {
            color: #38bdf8;
        }

        @media(max-width:768px) {

            body {
                padding: 15px;
                font-family: "Times New Roman", serif!important;
            `    align-items: flex-start;
                 padding-top: 0px!important;
                 margin-top: 0px!important;
            }
            
            html,
            body {
                width: 100%;
                height: 100%;
                overflow: hidden;
                position: fixed;
            }

            h1 {
                font-size: 28px;
            }

            textarea {
                height: 350px;
                font-family: "Times New Roman", serif;
                font-size: 20px;
                padding: 20px;
                line-height: 2;
                font-weight: 500;
            }

            .header {
                padding: 20px;
            }
            .footer {
                padding: 20px;
                line-height: 1.6;
            }

        }
        .copy-btn {
            display: block;
            margin: 20px auto;
            padding: 12px 24px;
            background: var(--primary);
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
            font-family: inherit;
        }

        .copy-btn:hover {
            background: #2563eb;
            transform: translateY(-2px);
        }

        .copy-btn:active {
            transform: translateY(0);
            box-shadow: 0 2px 8px rgba(59, 130, 246, 0.4);
        }
        .button-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 20px;
        }
        
        .copy-btn,
        .reset-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all .2s ease;
            font-family: inherit;
        }
        .button-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
        
            margin: 24px auto;
            width: fit    -content;
        }
        
        .copy-btn,
        .reset-btn {
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        
            min-width: 180px;
            height: 52px;
        
            padding: 0 24px;
        
            border: none;
            border-radius: 10px;
        
            color: #fff;
            font-size: 16px;
            font-weight: 600;
        
            cursor: pointer;
            transition: .25s;
        }
        
        .copy-btn {
            background: #3b82f6;
            box-shadow: 0 4px 15px rgba(59,130,246,.35);
        }
        
        .copy-btn:hover {
            background: #2563eb;
            transform: translateY(-2px);
        }
        
        .reset-btn {
            background: #ef4444;
            box-shadow: 0 4px 15px rgba(239,68,68,.35);
        }
        
        .reset-btn:hover {
            background: #dc2626;
            transform: translateY(-2px);
        }
        
        @media (max-width:768px){
        
            .button-group{
                width:100%;
                padding:0 15px;
                gap:10px;
            }
        
            .copy-btn,
            .reset-btn{
                flex:1;
                min-width:0;
                height:50px;
                font-size:15px;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="card">

            <div class="header">
                <h1>๐ป๐ณ VN Telex Input</h1>

                <div class="desc">
                    Bแป gรต tiแบฟng Viแปt trแปฑc tuyแบฟn hแป trแปฃ TELEX
                </div>

                <!-- <div class="guide">

                    <h3>Hฦฐแปng dแบซn TELEX</h3>

                    <p>
                        <kbd>aa</kbd> โ รข
                        <kbd>aw</kbd> โ ฤ

                    </p>

                    <br>

                    <p>

                        <kbd>f</kbd> โ huyแปn
                        <kbd>r</kbd> โ hแปi
                        <kbd>x</kbd> โ ngรฃ
                        <kbd>j</kbd> โ nแบทng
                    </p>

                </div> -->
            </div>
        </div>

        <textarea id="editor" placeholder="Nhแบญp tiแบฟng Viแปt bแบฑng TELEX..."></textarea>
        <div class="button-group">      
            <button id="copyBtn" class="copy-btn">
                Copy vฤn bแบฃn
            </button>
            <button id="resetBtn" class="reset-btn">
                Xรณa hแบฟt
            </button>
        </div>
        <div class="footer">
            Website gรต tiแบฟng Viแปt nร y ฤฦฐแปฃc tแบกo bแปi <strong>DLUONGTA</strong>
        </div>
    </div>
    </div>

<script>
    const editor = document.getElementById("editor");

    const toneMarks = {
        s: "\u0301", f: "\u0300", r: "\u0309", x: "\u0303", j: "\u0323"
    };

    const telexReplace = {
        "aa": "รข", "aw": "ฤ", "ee": "รช", "oo": "รด", "ow": "ฦก", "uw": "ฦฐ", "dd": "ฤ",
        "AA": "ร", "AW": "ฤ", "EE": "ร", "OO": "ร", "OW": "ฦ ", "UW": "ฦฏ", "DD": "ฤ"
    };

    const telexRestore = {
        "รขa": "a\u200Ca", "รa": "A\u200Ca", "รA": "A\u200CA", "รขA": "a\u200CA",
        "ฤw": "a\u200Cw", "ฤw": "A\u200Cw", "ฤW": "A\u200CW", "ฤW": "a\u200CW",
        "รชe": "e\u200Ce", "รe": "E\u200Ce", "รE": "E\u200CE", "รชE": "e\u200CE",
        "รดo": "o\u200Co", "รo": "O\u200Co", "รO": "O\u200CO", "รดO": "o\u200CO",
        "ฦกw": "o\u200Cw", "ฦ w": "O\u200Cw", "ฦ W": "O\u200CW", "ฦกW": "o\u200CW",
        "ฦฐw": "u\u200Cw", "ฦฏw": "U\u200Cw", "ฦฏW": "U\u200CW", "ฦฐW": "u\u200CW",
        "ฤd": "d\u200Cd", "ฤd": "D\u200Cd", "ฤD": "D\u200CD", "ฤD": "d\u200CD"
    };

    const decomposedMap = {
        "รข": "aa", "ฤ": "aw", "รช": "ee", "รด": "oo", "ฦก": "ow", "ฦฐ": "uw", "ฤ": "dd",
        "ร": "AA", "ฤ": "AW", "ร": "EE", "ร": "OO", "ฦ ": "OW", "ฦฏ": "UW", "ฤ": "DD"
    };

    const vowels = "aeiouyฤรขรชรดฦกฦฐAEIOUYฤรรรฦ ฦฏ";

    function isVowel(ch) { return vowels.includes(ch); }

    function findTonePosition(word) {
        const chars = [...word];
        const vowelPos = [];
        chars.forEach((c, i) => { if (isVowel(c)) vowelPos.push(i); });
        
        if (vowelPos.length === 0) return -1;
        if (vowelPos.length === 1) return vowelPos[0];

        const lower = word.toLowerCase();
        if (lower.includes("uyรช")) return lower.indexOf("รช");
        if (lower.includes("ฦฐฦก")) return lower.indexOf("ฦก");
        if (lower.includes("uรด")) return lower.indexOf("รด");
        if (lower.includes("iรช")) return lower.indexOf("รช");

        if (vowelPos.length === 2) {
            const pair = chars[vowelPos[0]].toLowerCase() + chars[vowelPos[1]].toLowerCase();
            if (pair === "oa" || pair === "oe" || pair === "uy") return vowelPos[1];
            return vowelPos[0];
        }
        return vowelPos[1];
    }

    function addTone(word, tone) {
        const pos = findTonePosition(word);
        if (pos === -1) return word;
        const chars = [...word];
        chars[pos] = (chars[pos] + tone).normalize("NFC");
        return chars.join("");
    }

    function processTelex(text) {
        // Bฦฐแปc 1: รp dแปฅng bแบฃng phแปฅc hแปi khi gรต lแบงn 3
        for (const key in telexRestore) {
            text = text.replace(new RegExp(key, "g"), telexRestore[key]);
        }

        // Bฦฐแปc 2: Thay thแบฟ tแป hแปฃp Telex vแปi thuแบญt toรกn bฤm nhแป chuแปi lแบทp mแปi cho Mobile
        for (const key in telexReplace) {
            const char1 = key[0];
            const char2 = key[1];
            const isDouble = (char1 === char2); 
            
            if (isDouble) {
                // Quรฉt tแบฅt cแบฃ cแปฅm chแปฏ cรกi lแบทp lแบกi (bแบฅt kแป cรณ dรญnh \u200C hay khรดng)
                const regex = new RegExp(`(?:${char1}\\u200C*){2,}`, "g");
                
                text = text.replace(regex, (match) => {
                    const cleanMatch = match.replace(/\u200C/g, ""); 
                    
                    if (cleanMatch === key) {
                        if (match.includes("\u200C")) return match; 
                        return telexReplace[key]; 
                    }
                    
                    // NรNG CแบคP CHIแบพN THUแบฌT: Nแบฟu chuแปi lแบทp tแปซ 3 chแปฏ trแป lรชn (aaa, aaaa, aaaaa...)
                    // Ta chรจn kรฝ tแปฑ tร ng hรฌnh vร o GIแปฎA TแปชNG Kร Tแปฐ mแปt ฤแป phรก vแปก hoร n toร n cฦก chแบฟ gแปp cแปงa Samsung
                    return cleanMatch.split("").join("\u200C") + "\u200C"; 
                });
            } else {
                const regex = new RegExp(key, "g");
                text = text.replace(regex, telexReplace[key]);
            }
        }

        // Bฦฐแปc 3: ฤแบทt dแบฅu thanh
        text = text.replace(/([^\s]+)([sfrxj])/gi, (_, word, tone) => {
            return addTone(word, toneMarks[tone.toLowerCase()]);
        });

        return text;
    }

    let lastOutputWord = ""; 

    editor.addEventListener("input", (e) => {
        if (e.inputType === "insertFromPaste" || e.inputType === "insertFromDrop") {
            return; 
        }

        const cursor = editor.selectionStart;
        const text = editor.value;

        let start = cursor - 1;
        const separators = /[\s\n.,;!?()[\]{}"'<>]/;

        while (start >= 0 && !separators.test(text[start])) {
            start--;
        }
        start++; 

        const beforeWord = text.substring(0, start);
        const currentWord = text.substring(start, cursor);
        const afterWord = text.substring(cursor);

        if (currentWord.length > 0) {
            const oldLength = currentWord.length;
            let processedWord = currentWord;

            let isNativeCancel = false;
            
            if (lastOutputWord && currentWord.length >= 2) {
                // Loแบกi bแป tแบฅt cแบฃ kรฝ tแปฑ tร ng hรฌnh trฦฐแปc khi so sรกnh logic hแปงy dแบฅu tแปฑ ฤแปng cแปงa mobile
                const cleanLastOutput = lastOutputWord.replace(/\u200C/g, "");
                const prevLastChar = cleanLastOutput.slice(-1); 
                const currentLastTwo = currentWord.replace(/\u200C/g, "").slice(-2);  
                
                if (decomposedMap[prevLastChar] && decomposedMap[prevLastChar].toLowerCase() === currentLastTwo.toLowerCase()) {
                    const prefixOutput = cleanLastOutput.slice(0, -1);
                    const prefixCurrent = currentWord.replace(/\u200C/g, "").slice(0, -2);
                    if (prefixOutput === prefixCurrent) {
                        isNativeCancel = true;
                    }
                }
            }

            if (isNativeCancel) {
                // Bร n phรญm tแปฑ hแปงy dแบฅu -> รp rแบฃi kรฝ tแปฑ tร ng hรฌnh toร n bแป chuแปi
                const cleanCurrent = currentWord.replace(/\u200C/g, "");
                processedWord = cleanCurrent.split("").join("\u200C") + "\u200C";
            } else {
                processedWord = processTelex(currentWord);
            }

            if (currentWord !== processedWord) {
                editor.value = beforeWord + processedWord + afterWord;
                
                const newCursor = cursor + (processedWord.length - oldLength);
                editor.setSelectionRange(newCursor, newCursor);
            }

            lastOutputWord = processedWord;
        } else {
            lastOutputWord = ""; 
        }
    });

    editor.focus();
    
    const copyBtn = document.getElementById("copyBtn");
    const resetBtn = document.getElementById("resetBtn");

    copyBtn.addEventListener("click", async () => {
        const textToCopy = editor.value.replace(/\u200C/g, "");
        if (!textToCopy) return;

        try {
            await navigator.clipboard.writeText(textToCopy);
            
            const originalText = copyBtn.innerHTML;
            copyBtn.innerHTML = "ฤรฃ copy thร nh cรดng!";
            copyBtn.style.background = "#10b981"; 
            
            setTimeout(() => {
                copyBtn.innerHTML = originalText;
                copyBtn.style.background = "";
            }, 2000);
            
        } catch (err) {
            console.error("Lแปi khi copy: ", err);
            alert("Khรดng thแป copy vฤn bแบฃn. Trรฌnh duyแปt cแปงa bแบกn cรณ thแป khรดng hแป trแปฃ!");
        }
    });

    resetBtn.addEventListener("click", () => {
        if (!editor.value) return;

        editor.value = "";
        lastOutputWord = ""; 
        // editor.focus();

        const originalText = resetBtn.innerHTML;
        resetBtn.innerHTML = "ฤรฃ xรณa";
        resetBtn.style.background = "#10b981";

        setTimeout(() => {
            resetBtn.innerHTML = originalText;
            resetBtn.style.background = "";
        }, 1500);
    });
</script>
