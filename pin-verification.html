<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIN Verification</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #e9ebee;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
        }

        .modal {
            background: #ffffff;
            width: 480px;
            max-width: 95%;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            padding: 40px 30px;
            text-align: center;
            position: relative;
            box-sizing: border-box;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 36px;
            height: 36px;
            background: #f0f2f5;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            color: #606770;
            font-size: 20px;
            font-weight: bold;
            border: none;
            transition: background 0.2s;
        }

        .close-btn:hover {
            background: #e4e6eb;
        }

        .illustration {
            width: 140px;
            height: 46px;
            background: linear-gradient(90deg, #e6f0ff, #d9e8ff);
            border-radius: 25px;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            color: white;
            font-size: 28px;
            font-weight: bold;
            margin-top: 20px;
        }

        .illustration .asterisk { color: #ffffff; text-shadow: 0px 1px 3px rgba(0,0,0,0.1); margin-top: 8px;}
        .illustration .blue-dot { width: 18px; height: 18px; background: #006aff; border-radius: 50%; margin-left: 5px; }

        /* Tiêu đề và mô tả */
        h2 {
            font-size: 20px;
            margin: 0 0 12px;
            color: #050505;
        }

        p {
            font-size: 15px;
            color: #65676b;
            margin: 0 0 20px;
            line-height: 1.5;
        }

        .pin-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .pin-input {
            width: 48px;
            height: 60px;
            background-color: #f0f2f5;
            border: 2px solid transparent;
            border-radius: 8px;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            outline: none;
            transition: all 0.2s;
            caret-color: transparent; 
        }

        .pin-input:focus {
            border-color: #006aff;
            background-color: #ffffff;
            caret-color: #006aff; 
        }

        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
            margin-top: 30px;
        }

        .btn-action {
            padding: 8px 16px;
            background: #f0f2f5;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            color: #050505;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-action:hover {
            background: #e4e6eb;
        }

        .link {
            color: #006aff;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            display: block;
        }

        .link:hover {
            text-decoration: underline;
        }

        .message-box {
            margin-top: 20px;
            font-size: 15px;
            font-weight: 600;
            min-height: 20px;
        }

        .success { color: #2b9a3f; }
        .error { color: #e41e3f; }

        @media (max-width: 768px) {
            body {
                overflow-y: hidden;
            }
            .modal {
                padding: 30px 15px;
                margin-top: -60px;
            }
            .pin-container {
                gap: 6px;
            }
            .pin-input {
                width: 40px;
                height: 50px;
                font-size: 24px;
            }
        }
    </style>
</head>
<body>

    <div class="modal">
        <button class="close-btn">&times;</button>
        
        <div class="illustration">
            <span class="asterisk">*</span>
            <span class="asterisk">*</span>
            <span class="asterisk">*</span>
            <span class="asterisk">*</span>
            <span class="asterisk">*</span>
            <div class="blue-dot"></div>
        </div>

        <h2>Enter your PIN</h2>
        <p>Enter your PIN for verification.</p>
        
        <div class="pin-container">
            <input type="password" class="pin-input" maxlength="1" autocomplete="off">
            <input type="password" class="pin-input" maxlength="1" autocomplete="off">
            <input type="password" class="pin-input" maxlength="1" autocomplete="off">
            <input type="password" class="pin-input" maxlength="1" autocomplete="off">
            <input type="password" class="pin-input" maxlength="1" autocomplete="off">
            <input type="password" class="pin-input" maxlength="1" autocomplete="off">
        </div>

        <div class="action-buttons">
            <button class="btn-action" id="btnClearOne">Delete</button>
            <button class="btn-action" id="btnClearAll">Clear all</button>
        </div>
        
        <!-- <a href="#" class="link">Use a one-time code</a> -->
        
        <div id="messageBox" class="message-box"></div>
    </div>

    <script>
        const inputs = document.querySelectorAll('.pin-input');
        const messageBox = document.getElementById('messageBox');
        const btnClearOne = document.getElementById('btnClearOne');
        const btnClearAll = document.getElementById('btnClearAll');
        const CORRECT_PIN = '123456';

        inputs[0].focus();

        inputs.forEach((input, index) => {
            input.addEventListener('focus', (e) => {
                let targetIndex = Array.from(inputs).findIndex(inp => inp.value === '');
                
                if (targetIndex === -1) {
                    targetIndex = inputs.length - 1;
                }

                if (index !== targetIndex) {
                    inputs[targetIndex].focus();
                }
            });

            input.addEventListener('input', (e) => {
                clearMessage();

                if (e.target.value.length > 1) {
                    e.target.value = e.target.value.slice(0, 1);
                }

                if (e.target.value !== '') {
                    if (index < inputs.length - 1) {
                        inputs[index + 1].focus();
                    } else {
                        checkPIN();
                    }
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && e.target.value === '') {
                    if (index > 0) {
                        inputs[index - 1].value = '';
                        inputs[index - 1].focus();
                        clearMessage();
                    }
                }
            });
        });

        function clearMessage() {
            messageBox.textContent = '';
            messageBox.className = 'message-box';
        }

        btnClearOne.addEventListener('click', () => {
            let lastFilledIndex = -1;
            for (let i = inputs.length - 1; i >= 0; i--) {
                if (inputs[i].value !== '') {
                    lastFilledIndex = i;
                    break;
                }
            }

            if (lastFilledIndex !== -1) {
                inputs[lastFilledIndex].value = '';
                inputs[lastFilledIndex].focus();
                clearMessage();
            } else {
                inputs[0].focus();
            }
        });

        btnClearAll.addEventListener('click', () => {
            inputs.forEach(input => input.value = '');
            clearMessage();
            inputs[0].focus();
        });

        function checkPIN() {
            let pin = '';
            inputs.forEach(input => {
                pin += input.value;
            });
            
            if (pin.length === 6) {
                if (pin === CORRECT_PIN) {
                    messageBox.textContent = '✅ Verification successful!';
                    messageBox.classList.add('success');
                } else {
                    messageBox.textContent = '❌ Incorrect PIN. Please try again!';
                    messageBox.classList.add('error');
                }
            }
        }
    </script>
</body>
</html>
