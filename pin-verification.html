<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIN Verification</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #e9ebee;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
        }

        .modal {
            background: #ffffff;
            width: 480px;
            max-width: 95%;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            padding: 40px 30px;
            text-align: center;
            position: relative;
            box-sizing: border-box;
            margin-top: -10px;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 36px;
            height: 36px;
            background: #f0f2f5;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            color: #606770;
            font-size: 20px;
            font-weight: bold;
            border: none;
            transition: background 0.2s;
        }

        .close-btn:hover {
            background: #e4e6eb;
        }

        .illustration {
            width: 140px;
            height: 46px;
            background: linear-gradient(90deg, #e6f0ff, #d9e8ff);
            border-radius: 25px;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            color: white;
            font-size: 28px;
            font-weight: bold;
            margin-top: 20px;
        }

        .illustration .asterisk {
            color: #ffffff;
            text-shadow: 0px 1px 3px rgba(0, 0, 0, 0.1);
            margin-top: 8px;
        }

        .illustration .blue-dot {
            width: 18px;
            height: 18px;
            background: #006aff;
            border-radius: 50%;
            margin-left: 5px;
        }

        h2 {
            font-size: 20px;
            margin: 0 0 12px;
            color: #050505;
        }

        p {
            font-size: 15px;
            color: #65676b;
            margin: 0 0 20px;
            line-height: 1.5;
        }

        .pin-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .pin-input {
            width: 48px;
            height: 60px;
            background-color: #f0f2f5;
            border: 2px solid transparent;
            border-radius: 8px;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            outline: none;
            transition: all 0.2s;
            caret-color: transparent;

            color: #686868;
        }

        .pin-input.filled {
            color: #050505;
        }

        .pin-input::selection {
            background: transparent;
        }

        .pin-input:focus {
            border-color: #006aff;
            background-color: #ffffff;
            caret-color: transparent;
            /* box-shadow: 0 0 0 3px rgba(0, 106, 255, 0.2); */
            box-shadow: none;
        }

        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
            margin-top: 30px;
        }

        .btn-action {
            padding: 8px 16px;
            background: #f0f2f5;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            color: #050505;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-action:hover {
            background: #e4e6eb;
        }

        .message-box {
            margin-top: 20px;
            font-size: 15px;
            font-weight: 600;
            min-height: 20px;
        }

        .success {
            color: #2b9a3f;
        }

        .error {
            color: #e41e3f;
        }

        @media (max-width: 768px) {
            body {
                overflow-y: hidden;
            }

            .modal {
                padding: 30px 15px;
                margin-top: -90px;
            }

            .pin-container {
                gap: 6px;
            }

            .pin-input {
                width: 40px;
                height: 50px;
                font-size: 24px;
            }
        }
    </style>
</head>

<body>

    <div class="modal">
        <button class="close-btn">&times;</button>

        <div class="illustration">
            <span class="asterisk">*</span>
            <span class="asterisk">*</span>
            <span class="asterisk">*</span>
            <span class="asterisk">*</span>
            <span class="asterisk">*</span>
            <div class="blue-dot"></div>
        </div>

        <h2>Enter your PIN</h2>
        <p>Enter your PIN for verification.</p>

        <div class="pin-container">
            <input type="text" class="pin-input" maxlength="2" autocomplete="off" value="-">
            <input type="text" class="pin-input" maxlength="2" autocomplete="off" value="-">
            <input type="text" class="pin-input" maxlength="2" autocomplete="off" value="-">
            <input type="text" class="pin-input" maxlength="2" autocomplete="off" value="-">
            <input type="text" class="pin-input" maxlength="2" autocomplete="off" value="-">
            <input type="text" class="pin-input" maxlength="2" autocomplete="off" value="-">
        </div>

        <div class="action-buttons">
            <button class="btn-action" id="btnClearOne">Delete</button>
            <button class="btn-action" id="btnClearAll">Clear all</button>
        </div>

        <div id="messageBox" class="message-box"></div>
    </div>

    <script>
        const inputs = document.querySelectorAll('.pin-input');
        const messageBox = document.getElementById('messageBox');
        const btnClearOne = document.getElementById('btnClearOne');
        const btnClearAll = document.getElementById('btnClearAll');
        const CORRECT_PIN = '123456';

        inputs[0].focus();

        inputs.forEach((input, index) => {
            // Xử lý khi người dùng click hoặc focus vào ô
            input.addEventListener('focus', (e) => {
                let targetIndex = Array.from(inputs).findIndex(inp => !inp.dataset.realValue);

                if (targetIndex === -1) {
                    targetIndex = inputs.length - 1; // Nếu đã điền hết thì focus vào ô cuối
                }

                if (index !== targetIndex) {
                    inputs[targetIndex].focus();
                }
            });

            // Xử lý khi gõ phím vào ô
            input.addEventListener('input', (e) => {
                clearMessage();
                let rawVal = e.target.value;

                // Loại bỏ dấu '-' hoặc dấu '•' để lấy đúng số người dùng vừa gõ vào
                let typedChar = rawVal.replace(/[-•]/g, '');

                if (typedChar === '') {
                    e.target.value = '-';
                    input.dataset.realValue = '';
                    input.classList.remove('filled'); // <--- Trở về màu xám
                    return;
                }

                // Lưu lại số thật vừa gõ
                input.dataset.realValue = typedChar.slice(-1);

                // Fix cứng hiển thị thành dấu chấm tròn
                e.target.value = '•';
                input.classList.add('filled'); // <--- Đổi sang màu đen

                // Chuyển sang ô tiếp theo
                if (index < inputs.length - 1) {
                    inputs[index + 1].focus();
                } else {
                    checkPIN();
                }
            });

            // Xử lý khi bấm phím Xoá (Backspace) trên bàn phím
            input.addEventListener('keydown', (e) => {
                if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown'].includes(e.key)) {
                    e.preventDefault();
                }

                if (e.key === 'Backspace') {
                    e.preventDefault();

                    let hasValue = (input.dataset.realValue !== undefined && input.dataset.realValue !== '');

                    if (hasValue) {
                        // Xoá dữ liệu ô hiện tại, đưa về '-'
                        input.value = '-';
                        input.dataset.realValue = '';
                        input.classList.remove('filled'); // <--- Trở về màu xám
                        clearMessage();
                    } else {
                        // Nếu ô hiện tại đã là '-', lùi về ô trước đó và xoá nó
                        if (index > 0) {
                            inputs[index - 1].value = '-';
                            inputs[index - 1].dataset.realValue = '';
                            inputs[index - 1].classList.remove('filled'); // <--- Trở về màu xám
                            inputs[index - 1].focus();
                            clearMessage();
                        }
                    }
                }
            });
        });

        function clearMessage() {
            messageBox.textContent = '';
            messageBox.className = 'message-box';
        }

        // Xử lý nút Delete (Xoá 1 ô)
        btnClearOne.addEventListener('click', () => {
            let lastFilledIndex = -1;
            for (let i = inputs.length - 1; i >= 0; i--) {
                if (inputs[i].dataset.realValue) {
                    lastFilledIndex = i;
                    break;
                }
            }

            if (lastFilledIndex !== -1) {
                inputs[lastFilledIndex].value = '-';
                inputs[lastFilledIndex].dataset.realValue = '';
                inputs[lastFilledIndex].classList.remove('filled'); // <--- Trở về màu xám
                inputs[lastFilledIndex].focus();
                clearMessage();
            } else {
                inputs[0].focus();
            }
        });

        // Xử lý nút Clear all (Xoá tất cả)
        btnClearAll.addEventListener('click', () => {
            inputs.forEach(input => {
                input.value = '-';
                input.dataset.realValue = '';
                input.classList.remove('filled'); // <--- Trở về màu xám
            });
            clearMessage();
            inputs[0].focus();
        });

        function checkPIN() {
            let pin = '';
            inputs.forEach(input => {
                pin += input.dataset.realValue || '';
            });

            if (pin.length === 6) {
                if (pin === CORRECT_PIN) {
                    messageBox.textContent = '✅ Verification successful!';
                    messageBox.classList.add('success');
                } else {
                    messageBox.textContent = '❌ Incorrect PIN. Please try again!';
                    messageBox.classList.add('error');
                }
            }
        }
    </script>
</body>

</html>
