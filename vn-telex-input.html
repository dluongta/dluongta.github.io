        <textarea id="editor" placeholder="Nhل؛­p tiل؛؟ng Viل»‡t bل؛±ng TELEX..."></textarea>
        <div class="button-group">      
            <button id="copyBtn" class="copy-btn">
                Copy vؤƒn bل؛£n
            </button>

            </button>

        <div class="footer">

<script>
    const editor = document.getElementById("editor");

    const toneMarks = {
        s: "\u0301", f: "\u0300", r: "\u0309", x: "\u0303", j: "\u0323"
    };

    const telexReplace = {
        "aa": "أ¢", "aw": "ؤƒ", "ee": "أھ", "oo": "أ´", "ow": "ئ،", "uw": "ئ°", "dd": "ؤ‘",
        "AA": "أ‚", "AW": "ؤ‚", "EE": "أٹ", "OO": "أ”", "OW": "ئ ", "UW": "ئ¯", "DD": "ؤگ"
    };

    const telexRestore = {
        "أ¢a": "a\u200Ca", "أ‚a": "A\u200Ca", "أ‚A": "A\u200CA", "أ¢A": "a\u200CA",
        "ؤƒw": "a\u200Cw", "ؤ‚w": "A\u200Cw", "ؤ‚W": "A\u200CW", "ؤƒW": "a\u200CW",
        "أھe": "e\u200Ce", "أٹe": "E\u200Ce", "أٹE": "E\u200CE", "أھE": "e\u200CE",
        "أ´o": "o\u200Co", "أ”o": "O\u200Co", "أ”O": "O\u200CO", "أ´O": "o\u200CO",
        "ئ،w": "o\u200Cw", "ئ w": "O\u200Cw", "ئ W": "O\u200CW", "ئ،W": "o\u200CW",
        "ئ°w": "u\u200Cw", "ئ¯w": "U\u200Cw", "ئ¯W": "U\u200CW", "ئ°W": "u\u200CW",
        "ؤ‘d": "d\u200Cd", "ؤگd": "D\u200Cd", "ؤگD": "D\u200CD", "ؤ‘D": "d\u200CD"
    };

    const decomposedMap = {
        "أ¢": "aa", "ؤƒ": "aw", "أھ": "ee", "أ´": "oo", "ئ،": "ow", "ئ°": "uw", "ؤ‘": "dd",
        "أ‚": "AA", "ؤ‚": "AW", "أٹ": "EE", "أ”": "OO", "ئ ": "OW", "ئ¯": "UW", "ؤگ": "DD"
    };

    const vowels = "aeiouyؤƒأ¢أھأ´ئ،ئ°AEIOUYؤ‚أ‚أٹأ”ئ ئ¯";

    function isVowel(ch) { return vowels.includes(ch); }

    function findTonePosition(word) {
        const chars = [...word];
        const vowelPos = [];
        chars.forEach((c, i) => { if (isVowel(c)) vowelPos.push(i); });
        
        if (vowelPos.length === 0) return -1;
        if (vowelPos.length === 1) return vowelPos[0];

        const lower = word.toLowerCase();
        if (lower.includes("uyأھ")) return lower.indexOf("أھ");
        if (lower.includes("ئ°ئ،")) return lower.indexOf("ئ،");
        if (lower.includes("uأ´")) return lower.indexOf("أ´");
        if (lower.includes("iأھ")) return lower.indexOf("أھ");

        if (vowelPos.length === 2) {
            const pair = chars[vowelPos[0]].toLowerCase() + chars[vowelPos[1]].toLowerCase();
            if (pair === "oa" || pair === "oe" || pair === "uy") return vowelPos[1];
            return vowelPos[0];
        }
        return vowelPos[1];
    }

    function addTone(word, tone) {
        const pos = findTonePosition(word);
        if (pos === -1) return word;
        const chars = [...word];
        chars[pos] = (chars[pos] + tone).normalize("NFC");
        return chars.join("");
    }

    function processTelex(text) {
        // Bئ°ل»›c 1: أپp dل»¥ng bل؛£ng phل»¥c hل»“i khi gأµ lل؛§n 3
        for (const key in telexRestore) {
            text = text.replace(new RegExp(key, "g"), telexRestore[key]);
        }

        // Bئ°ل»›c 2: Thay thل؛؟ tل»• hل»£p Telex vل»›i thuل؛­t toأ،n bؤƒm nhل»ڈ chuل»—i lل؛·p mل»›i cho Mobile
        for (const key in telexReplace) {
            const char1 = key[0];
            const char2 = key[1];
            const isDouble = (char1 === char2); 
            
            if (isDouble) {
                // Quأ©t tل؛¥t cل؛£ cل»¥m chل»¯ cأ،i lل؛·p lل؛،i (bل؛¥t kل»ƒ cأ³ dأ­nh \u200C hay khأ´ng)
                const regex = new RegExp(`(?:${char1}\\u200C*){2,}`, "g");
                
                text = text.replace(regex, (match) => {
                    const cleanMatch = match.replace(/\u200C/g, ""); 
                    
                    if (cleanMatch === key) {
                        if (match.includes("\u200C")) return match; 
                        return telexReplace[key]; 
                    }
                    
                    // Nأ‚NG Cل؛¤P CHIل؛¾N THUل؛¬T: Nل؛؟u chuل»—i lل؛·p tل»« 3 chل»¯ trل»ں lأھn (aaa, aaaa, aaaaa...)
                    // Ta chأ¨n kأ½ tل»± tأ ng hأ¬nh vأ o GIل»®A Tل»ھNG Kأ‌ Tل»° mل»™t ؤ‘ل»ƒ phأ، vل»، hoأ n toأ n cئ، chل؛؟ gل»™p cل»§a Samsung
                    return cleanMatch.split("").join("\u200C") + "\u200C"; 
                });
            } else {
                const regex = new RegExp(key, "g");
                text = text.replace(regex, telexReplace[key]);
            }
        }

        // Bئ°ل»›c 3: ؤگل؛·t dل؛¥u thanh
        text = text.replace(/([^\s]+)([sfrxj])/gi, (_, word, tone) => {
            return addTone(word, toneMarks[tone.toLowerCase()]);
        });

        return text;
    }

    let lastOutputWord = ""; 

    editor.addEventListener("input", (e) => {
        if (e.inputType === "insertFromPaste" || e.inputType === "insertFromDrop") {
            return; 
        }

        const cursor = editor.selectionStart;
        const text = editor.value;

        let start = cursor - 1;
        const separators = /[\s\n.,;!?()[\]{}"'<>]/;

        while (start >= 0 && !separators.test(text[start])) {
            start--;
        }
        start++; 

        const beforeWord = text.substring(0, start);
        const currentWord = text.substring(start, cursor);
        const afterWord = text.substring(cursor);

        if (currentWord.length > 0) {
            const oldLength = currentWord.length;
            let processedWord = currentWord;

            let isNativeCancel = false;
            
            if (lastOutputWord && currentWord.length >= 2) {
                // Loل؛،i bل»ڈ tل؛¥t cل؛£ kأ½ tل»± tأ ng hأ¬nh trئ°ل»›c khi so sأ،nh logic hل»§y dل؛¥u tل»± ؤ‘ل»™ng cل»§a mobile
                const cleanLastOutput = lastOutputWord.replace(/\u200C/g, "");
                const prevLastChar = cleanLastOutput.slice(-1); 
                const currentLastTwo = currentWord.replace(/\u200C/g, "").slice(-2);  
                
                if (decomposedMap[prevLastChar] && decomposedMap[prevLastChar].toLowerCase() === currentLastTwo.toLowerCase()) {
                    const prefixOutput = cleanLastOutput.slice(0, -1);
                    const prefixCurrent = currentWord.replace(/\u200C/g, "").slice(0, -2);
                    if (prefixOutput === prefixCurrent) {
                        isNativeCancel = true;
                    }
                }
            }

            if (isNativeCancel) {
                // Bأ n phأ­m tل»± hل»§y dل؛¥u -> أ‰p rل؛£i kأ½ tل»± tأ ng hأ¬nh toأ n bل»™ chuل»—i
                const cleanCurrent = currentWord.replace(/\u200C/g, "");
                processedWord = cleanCurrent.split("").join("\u200C") + "\u200C";
            } else {
                processedWord = processTelex(currentWord);
            }

            if (currentWord !== processedWord) {
                editor.value = beforeWord + processedWord + afterWord;
                
                const newCursor = cursor + (processedWord.length - oldLength);
                editor.setSelectionRange(newCursor, newCursor);
            }

            lastOutputWord = processedWord;
        } else {
            lastOutputWord = ""; 
        }
    });

    editor.focus();
    
    const copyBtn = document.getElementById("copyBtn");
    const resetBtn = document.getElementById("resetBtn");

    copyBtn.addEventListener("click", async () => {
        const textToCopy = editor.value.replace(/\u200C/g, "");
        if (!textToCopy) return;

        try {
            await navigator.clipboard.writeText(textToCopy);
            
            const originalText = copyBtn.innerHTML;
            copyBtn.innerHTML = "ؤگأ£ copy thأ nh cأ´ng!";
            copyBtn.style.background = "#10b981"; 
            
            setTimeout(() => {
                copyBtn.innerHTML = originalText;
                copyBtn.style.background = "";
            }, 2000);
            
        } catch (err) {
            console.error("Lل»—i khi copy: ", err);
            alert("Khأ´ng thل»ƒ copy vؤƒn bل؛£n. Trأ¬nh duyل»‡t cل»§a bل؛،n cأ³ thل»ƒ khأ´ng hل»— trل»£!");
        }
    });

    resetBtn.addEventListener("click", () => {
        if (!editor.value) return;

        editor.value = "";
        lastOutputWord = ""; 
        // editor.focus();

        const originalText = resetBtn.innerHTML;
        resetBtn.innerHTML = "ؤگأ£ xأ³a";
        resetBtn.style.background = "#10b981";

        setTimeout(() => {
            resetBtn.innerHTML = originalText;
            resetBtn.style.background = "";
        }, 1500);
    });
</script>
