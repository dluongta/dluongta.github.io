<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Generator</title>
    <!-- <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script> -->
    <script src="qrcode.min.js"></script>
<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:20px;
    font-family:Arial,sans-serif;
    background:#ffffff;
    color:#111;
    text-align:center;
}

h1{
    color:#007bff;
    margin-bottom:20px;
}

.container{
    max-width:600px;
    margin:auto;
}

textarea{
    width:100%;
    height:120px;
    padding:15px;
    border-radius:12px;
    border:2px solid #007bff;
    resize:none;
    font-size:16px;
    outline:none;
}

.controls{
    margin-top:20px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

.control-box{
    background:#f5f5f5;
    padding:15px;
    border-radius:14px;
}

label{
    display:block;
    margin-bottom:10px;
    font-weight:bold;
}

input[type=color]{
    width:100%;
    height:50px;
    border:none;
    background:none;
    cursor:pointer;
}

.file-upload{
    position:relative;
    width:100%;
    padding:18px;
    border:2px dashed #007bff;
    border-radius:14px;
    background:#ffffff;
    cursor:pointer;
    transition:0.2s;
    overflow:hidden;
}

.file-upload:hover{
    background:#eef6ff;
}

.file-upload span{
    display:block;
    color:#007bff;
    font-size:15px;
    font-weight:bold;
}

.file-upload input{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    opacity:0;
    cursor:pointer;
}

.preview{
    margin-top:15px;
    display:none;
}

.preview img{
    width:90px;
    height:90px;
    object-fit:cover;
    border-radius:14px;
    border:2px solid #007bff;
}

button{
    margin-top:20px;
    background:#007bff;
    color:white;
    border:none;
    padding:14px 22px;
    border-radius:12px;
    font-size:16px;
    cursor:pointer;
    font-weight:bold;
    transition:0.2s;
}

button:hover{
    background:#005fd1;
}

.canvas-box{
    margin-top:30px;
}

canvas{
    max-width:100%;
    border:2px solid #007bff;
    border-radius:12px;
}

@media(max-width:768px){

    h1{
        color:#ff8800;
    }

    textarea{
        border-color:#ff8800;
    }

    canvas{
        border-color:#ff8800;
    }

    button{
        background:#ff8800;
    }

    button:hover{
        background:#e67600;
    }

    .controls{
        grid-template-columns:1fr;
    }

    .file-upload{
        border-color:#ff8800;
    }

    .file-upload span{
        color:#ff8800;
    }

    .file-upload:hover{
        background:#fff4e8;
    }

    .preview img{
        border-color:#ff8800;
    }
}
</style>
</head>

<body>

<div class="container">

<h1>QR Generator</h1>

<textarea id="qrText" placeholder="Nhập text hoặc link..."></textarea>

<div class="controls">

    <div class="control-box">
        <label>Màu QR</label>
        <input type="color" id="qrColor" value="#000000">
    </div>

    <div class="control-box">
        <label>Màu nền</label>
        <input type="color" id="bgColor" value="#ffffff">
    </div>

    <div class="control-box" style="grid-column:1/-1;">

        <label>Upload ảnh logo giữa QR</label>

        <div class="file-upload">
            <span>Chọn ảnh hoặc kéo thả vào đây</span>
            <input type="file" id="logoInput" accept="image/*">
        </div>

        <div class="preview" id="preview">
            <img id="previewImg">
        </div>

    </div>

</div>

<button onclick="generateQR()">Tạo QR</button>

<button onclick="downloadQR()">Download PNG</button>

<div class="canvas-box">
    <canvas id="canvas" width="250" height="250"></canvas>
</div>

</div>

<script>
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

const preview=document.getElementById("preview");
const previewImg=document.getElementById("previewImg");

let logoImage=null;

document.getElementById("logoInput").addEventListener("change",function(e){

    const file=e.target.files[0];

    if(!file) return;

    const reader=new FileReader();

    reader.onload=function(event){

        preview.style.display="block";

        previewImg.src=event.target.result;

        logoImage=new Image();

        logoImage.onload=function(){

            generateQR();

        };

        logoImage.src=event.target.result;
    };

    reader.readAsDataURL(file);

});

async function generateQR(){

    const text=document.getElementById("qrText").value.trim();

    const qrColor=document.getElementById("qrColor").value;

    const bgColor=document.getElementById("bgColor").value;

    if(!text){

        alert("Vui lòng nhập nội dung");

        return;
    }

    ctx.clearRect(0,0,canvas.width,canvas.height);

    await QRCode.toCanvas(canvas,text,{
        width:250,
        margin:2,
        color:{
            dark:qrColor,
            light:bgColor
        }
    });

    if(logoImage){

        const size=100;

        const x=(canvas.width-size)/2;

        const y=(canvas.height-size)/2;

        ctx.fillStyle=bgColor;

        ctx.beginPath();
        ctx.roundRect(x-10,y-10,size+20,size+20,20);
        ctx.fill();

        ctx.save();

        ctx.beginPath();
        ctx.roundRect(x,y,size,size,18);
        ctx.clip();

        ctx.drawImage(logoImage,x,y,size,size);

        ctx.restore();
    }
}

function downloadQR(){

    const link=document.createElement("a");

    link.download="qr-code.png";

    link.href=canvas.toDataURL("image/png");

    link.click();
}
</script>

</body>
</html>
