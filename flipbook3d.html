<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D PDF Flipbook</title>
    <script src="pdf.min.js"></script>
    <style>
        :root {
            --bg-color: #2c3e50;
            --page-width: 300px;
            --page-height: 420px;
            --transition-speed: 0.65s;
            --accent-color: #3498db;
            --text-color: #ecf0f1;
        }


        body {
            background-color: var(--bg-color);
            margin: 0;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            color: var(--text-color);
            overscroll-behavior: none; 
        }

        /* --- CONTROLS AREA --- */
        .controls {
            background: rgba(0, 0, 0, 0.9);
            padding: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        .btn-group {
            display: flex;
            gap: 6px;
            align-items: center;
            background: rgba(255, 255, 255, 0.08);
            padding: 5px 12px;
            border-radius: 20px;
        }

        .desktop-only { display: inline; }

        @media (max-width: 600px) {
            .desktop-only { display: none; }
            .btn-group { padding: 4px 6px; gap: 4px; }
            #pageDisplay { font-size: 13px; min-width: 55px; text-align: center; }
            button { padding: 6px 10px; font-size: 13px; }
        }

        input#pageInput {
            width: 40px;
            padding: 4px;
            background: rgba(255,255,255,0.1);
            border: 1px solid #777;
            color: white;
            text-align: center;
            border-radius: 4px;
            font-weight: bold;
            -moz-appearance: textfield;
            outline: none;
        }
        input#pageInput:focus { border-color: var(--accent-color); }
        input#pageInput::-webkit-outer-spin-button,
        input#pageInput::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

        button {
            padding: 6px 14px;
            cursor: pointer;
            border-radius: 4px;
            border: none;
            background: #485460;
            color: white;
            transition: 0.2s;
            font-size: 14px;
            font-weight: 500;
        }
        button:active { transform: scale(0.92); }
        button:hover { background: var(--accent-color); }

        /* --- VIEWPORT --- */
        #viewport {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            touch-action: none;
            perspective: 2500px;
        }

        .side-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 45px;
            height: 70px;
            background: rgba(0, 0, 0, 0.4);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
            z-index: 1500;
            border-radius: 8px;
            transition: background 0.3s;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .side-nav:hover { background: var(--accent-color); }
        .side-nav.left { left: 10px; }
        .side-nav.right { right: 10px; }

        @media (max-width: 768px) { .side-nav { display: none; } }

        /* --- BOOK 3D STRUCTURE --- */
        #zoom-container {
            transition: transform 0.15s ease-out;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            will-change: transform;
        }

        .book-aligner {
            width: var(--page-width);
            height: var(--page-height);
            position: relative;
            transition: transform var(--transition-speed) cubic-bezier(0.25, 1, 0.5, 1);
            transform-origin: center center;
            will-change: transform;
        }

        .align-cover { transform: translateX(0); }
        .align-open { transform: translateX(calc(var(--page-width) / 2)); }
        .align-end { transform: translateX(var(--page-width)); }

        @media (max-width: 768px) {
            /* Tinh chỉnh riêng cho Mobile để sách mặc định to rõ ràng */
            .align-open { transform: translateX(calc(var(--page-width) / 2)) scale(1); }
            .align-end { transform: translateX(var(--page-width)) scale(1); }
            /* Trang bìa khi chưa mở sẽ được phóng to 1.35 lần giữa màn hình */
            .align-cover { transform: scale(1.35); } 
        }

        .book {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
        }

        .page {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            transform-origin: left;
            transform-style: preserve-3d;
            transition: transform var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
            will-change: transform;
        }

        .page.flipped { transform: rotateY(-180deg); }

        .front, .back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            background: #fff;
            overflow: hidden;
            pointer-events: auto;
            z-index: 10;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
        }

        .front {
            border-radius: 1px 4px 4px 1px;
            box-shadow: inset 10px 0 20px rgba(0, 0, 0, 0.04), 2px 0 8px rgba(0, 0, 0, 0.1);
        }
        
        .back {
            transform: rotateY(180deg);
            border-radius: 4px 1px 1px 4px;
            box-shadow: inset -10px 0 20px rgba(0, 0, 0, 0.04), -2px 0 8px rgba(0, 0, 0, 0.1);
        }

        canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
            transform: translateZ(0); 
            -webkit-font-smoothing: antialiased;
            image-rendering: high-quality;
            image-rendering: -webkit-optimize-contrast;
        }

        .placeholder {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fdfdfd;
            color: #bdc3c7;
            font-size: 14px;
            z-index: -1;
        }

        .loader-spinner {
            width: 24px; height: 24px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #main-loading {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 1.1rem;
            background: rgba(0, 0, 0, 0.85);
            padding: 15px 30px;
            border-radius: 30px;
            pointer-events: none;
            z-index: 3000;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .front::after {
            content: ""; position: absolute; top: 0; bottom: 0; left: 0; width: 30px;
            background: linear-gradient(to right, rgba(0, 0, 0, 0.12), transparent);
            pointer-events: none;
        }
        .back::after {
            content: ""; position: absolute; top: 0; bottom: 0; right: 0; width: 30px;
            background: linear-gradient(to left, rgba(0, 0, 0, 0.12), transparent);
            pointer-events: none;
        }

        .click-area {
            position: absolute; top: 0; bottom: 0; z-index: 50; width: 40%;
            cursor: pointer; background: transparent; -webkit-tap-highlight-color: transparent;
        }
        .click-area.right { right: 0; }
        .click-area.left { left: 0; }
    </style>
</head>

<body>

    <div class="controls">
        <div class="btn-group">
            <button onclick="prevPage()" title="Phím mũi tên trái">❮</button>
            <span id="pageDisplay">...</span>
            <button onclick="nextPage()" title="Phím mũi tên phải">❯</button>
        </div>

        <div class="btn-group">
            <span class="desktop-only">Trang:</span>
            <input type="number" id="pageInput" min="1" value="1" onchange="goToPage()">
        </div>

        <div class="btn-group">
            <button onclick="zoomOut()" title="Phím -">−</button>
            <span id="zoom-level" style="font-size: 13px; min-width: 45px; text-align:center;">100%</span>
            <button onclick="zoomIn()" title="Phím +">+</button>
            <button onclick="resetView()">Reset</button>
        </div>
    </div>

    <div id="viewport">
        <div id="main-loading"><div class="loader-spinner"></div> Đang tải sách...</div>

        <div class="side-nav left" onclick="prevPage()">‹</div>
        <div class="side-nav right" onclick="nextPage()">›</div>

        <div id="zoom-container">
            <div id="book-aligner" class="book-aligner align-cover">
                <div id="book" class="book"></div>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const pdfUrl = 'book.pdf'; // URL file PDF của bạn
        const pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'pdf.worker.min.js';

        let pdfDoc = null;
        let totalPages = 0;
        let currentSheet = 0;
        const sheetsArray = [];
        const activeCanvases = new Map(); 

        let zoom = 1;
        let translateX = 0, translateY = 0;
        let isDragging = false;
        let startX, startY;
        let initialPinchDistance = 0, initialZoom = 1;

        function updateBookDimensions() {
            const viewport = document.getElementById('viewport');
            const vWidth = viewport.clientWidth;
            const vHeight = viewport.clientHeight;
            let pWidth, pHeight;
            const aspectRatio = 0.707; // Chuẩn A4

            if (vWidth < 768) { 
                // Ép kích thước khung sách trên mobile chiếm 96% chiều rộng (mỗi trang chiếm 48%)
                pWidth = vWidth * 0.48;
                pHeight = pWidth / aspectRatio;
                
                // Tránh tình trạng bị khuất màn hình dọc khi scale bìa sách lên 1.35x
                if (pHeight > vHeight * 0.6) {
                    pHeight = vHeight * 0.6;
                    pWidth = pHeight * aspectRatio;
                }
            } else { 
                // PC giữ nguyên chuẩn 100% cực nét
                pHeight = vHeight * 0.85;
                pWidth = pHeight * aspectRatio;
            }

            document.documentElement.style.setProperty('--page-width', `${Math.round(pWidth)}px`);
            document.documentElement.style.setProperty('--page-height', `${Math.round(pHeight)}px`);
        }

        async function init() {
            updateBookDimensions();
            window.addEventListener('resize', () => {
                updateBookDimensions();
                setTimeout(() => loadVisiblePages(currentSheet, true), 300);
            });

            try {
                const loadingTask = pdfjsLib.getDocument(pdfUrl);
                pdfDoc = await loadingTask.promise;
                totalPages = pdfDoc.numPages;
                document.getElementById('pageInput').max = totalPages;
                
                buildDOMStructure();
                document.getElementById('main-loading').style.display = 'none';
                updateUI(); 
            } catch (err) {
                console.error("PDF Load Error:", err);
                document.getElementById('main-loading').innerHTML = "Lỗi tải file PDF!";
                document.getElementById('main-loading').style.background = "rgba(220, 53, 69, 0.9)";
            }
        }

        function buildDOMStructure() {
            const book = document.getElementById('book');
            book.innerHTML = '';
            const totalSheets = Math.ceil(totalPages / 2);

            for (let i = 0; i < totalSheets; i++) {
                const pageNumFront = i * 2 + 1;
                const pageNumBack = i * 2 + 2;
                
                const sheetEl = document.createElement('div');
                sheetEl.className = 'page';
                sheetEl.style.zIndex = totalSheets - i;

                const front = document.createElement('div');
                front.className = 'front';
                front.dataset.page = pageNumFront;
                front.innerHTML = `
                    <div class="placeholder" id="placeholder-${pageNumFront}"><div class="loader-spinner"></div></div>
                    <div class="click-area right" onclick="event.stopPropagation(); nextPage()"></div>
                `;
                sheetEl.appendChild(front);

                const back = document.createElement('div');
                back.className = 'back';
                back.dataset.page = pageNumBack <= totalPages ? pageNumBack : 'none';
                
                if (pageNumBack <= totalPages) {
                    back.innerHTML = `
                        <div class="placeholder" id="placeholder-${pageNumBack}"><div class="loader-spinner"></div></div>
                        <div class="click-area left" onclick="event.stopPropagation(); prevPage()"></div>
                    `;
                } else {
                    back.style.backgroundColor = "#e0e0e0"; 
                    back.innerHTML = `<div class="click-area left" onclick="event.stopPropagation(); prevPage()"></div>`;
                }
                sheetEl.appendChild(back);

                book.appendChild(sheetEl);
                sheetsArray.push({ element: sheetEl, frontNum: pageNumFront, backNum: pageNumBack <= totalPages ? pageNumBack : null });
            }
        }

        function garbageCollection(safeSheets) {
            for (let [pageNum, canvas] of activeCanvases.entries()) {
                let isSafe = false;
                for (let sheetIdx of safeSheets) {
                    if (sheetIdx >= 0 && sheetIdx < sheetsArray.length) {
                        const s = sheetsArray[sheetIdx];
                        if (s.frontNum == pageNum || s.backNum == pageNum) {
                            isSafe = true; break;
                        }
                    }
                }
                
                if (!isSafe) {
                    canvas.width = 1; canvas.height = 1; 
                    canvas.remove();
                    activeCanvases.delete(pageNum);
                    
                    const placeholder = document.getElementById(`placeholder-${pageNum}`);
                    if (placeholder) placeholder.style.display = 'flex';
                }
            }
        }

        async function loadVisiblePages(sheetIndex, forceRebuild = false) {
            const safeSheets = [sheetIndex - 1, sheetIndex, sheetIndex + 1];
            garbageCollection(safeSheets); 

            await renderSheet(sheetIndex, forceRebuild);
            await renderSheet(sheetIndex + 1, forceRebuild);
            await renderSheet(sheetIndex - 1, forceRebuild);
        }

        async function renderSheet(idx, forceRebuild) {
            if (idx < 0 || idx >= sheetsArray.length) return;
            const sheetInfo = sheetsArray[idx];
            
            if (sheetInfo.frontNum) {
                await renderSinglePage(sheetInfo.frontNum, sheetInfo.element.querySelector('.front'), forceRebuild);
            }
            if (sheetInfo.backNum) {
                await renderSinglePage(sheetInfo.backNum, sheetInfo.element.querySelector('.back'), forceRebuild);
            }
        }

        async function renderSinglePage(pageNum, container, forceRebuild) {
            if (!container) return;
            if (!forceRebuild && activeCanvases.has(pageNum.toString())) return;

            try {
                const page = await pdfDoc.getPage(pageNum);
                
                const bookAligner = document.getElementById('book-aligner');
                const cssWidth = bookAligner.clientWidth;
                const dpr = window.devicePixelRatio || 1;
                
                const MIN_CANVAS_WIDTH = 1600; 
                let targetCanvasWidth = cssWidth * dpr * 2.5; 
                
                if (targetCanvasWidth < MIN_CANVAS_WIDTH) {
                    targetCanvasWidth = MIN_CANVAS_WIDTH;
                }
                
                const unscaledViewport = page.getViewport({ scale: 1 });
                const requiredScale = targetCanvasWidth / unscaledViewport.width;
                const viewport = page.getViewport({ scale: requiredScale });

                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d', { alpha: false }); 
                
                canvas.width = viewport.width;
                canvas.height = viewport.height;

                context.imageSmoothingEnabled = true;
                context.imageSmoothingQuality = 'high';

                const renderContext = { canvasContext: context, viewport: viewport };
                await page.render(renderContext).promise;

                const oldCanvas = container.querySelector('canvas');
                if (oldCanvas) {
                    oldCanvas.width = 1; oldCanvas.remove();
                }

                const placeholder = document.getElementById(`placeholder-${pageNum}`);
                if (placeholder) placeholder.style.display = 'none';
                
                container.insertBefore(canvas, container.firstChild);
                activeCanvases.set(pageNum.toString(), canvas);

            } catch (e) {
                console.warn(`Lỗi render trang ${pageNum}`, e);
            }
        }

        function nextPage() {
            if (currentSheet < sheetsArray.length) {
                sheetsArray[currentSheet].element.classList.add('flipped');
                currentSheet++;
                updateUI();
            }
        }

        function prevPage() {
            if (currentSheet > 0) {
                currentSheet--;
                sheetsArray[currentSheet].element.classList.remove('flipped');
                updateUI();
            }
        }

        function goToPage() {
            const input = document.getElementById('pageInput');
            let p = parseInt(input.value);
            if (isNaN(p) || p < 1) p = 1;
            if (p > totalPages) p = totalPages;
            
            const targetSheet = Math.floor((p - 1) / 2);

            sheetsArray.forEach((sheetInfo, idx) => {
                if (idx < targetSheet) sheetInfo.element.classList.add('flipped');
                else sheetInfo.element.classList.remove('flipped');
            });

            if (p % 2 === 0) {
                sheetsArray[targetSheet].element.classList.add('flipped');
                currentSheet = targetSheet + 1;
            } else {
                currentSheet = targetSheet;
            }
            
            updateUI();
            input.blur(); 
        }

        function updateUI() {
            const aligner = document.getElementById('book-aligner');
            if (currentSheet === 0) aligner.className = 'book-aligner align-cover';
            else if (currentSheet === sheetsArray.length) aligner.className = 'book-aligner align-end';
            else aligner.className = 'book-aligner align-open';

            const display = document.getElementById('pageDisplay');
            const pLeft = currentSheet * 2;
            const pRight = pLeft + 1;

            if (currentSheet === 0) {
                display.innerText = `1 / ${totalPages}`;
                document.getElementById('pageInput').value = 1;
            } else if (currentSheet === sheetsArray.length) {
                display.innerText = `Hết`;
                document.getElementById('pageInput').value = totalPages;
            } else {
                display.innerText = `${pLeft}-${pRight > totalPages ? pLeft : pRight}`;
                document.getElementById('pageInput').value = pLeft;
            }

            sheetsArray.forEach((sheetInfo, index) => {
                if (index < currentSheet) sheetInfo.element.style.zIndex = index;
                else sheetInfo.element.style.zIndex = sheetsArray.length - index + currentSheet;
            });

            loadVisiblePages(currentSheet);
        }

        const zoomContainer = document.getElementById('zoom-container');
        const viewportEl = document.getElementById('viewport');

        function applyTransform() {
            zoomContainer.style.transform = `translate(${translateX}px, ${translateY}px) scale(${zoom})`;
        }

        function zoomIn() { zoom = Math.min(zoom + 0.3, 3); updateZoomText(); }
        function zoomOut() { zoom = Math.max(zoom - 0.3, 0.5); updateZoomText(); }
        function resetView() { zoom = 1; translateX = 0; translateY = 0; updateZoomText(); }
        
        function updateZoomText() {
            document.getElementById('zoom-level').innerText = Math.round(zoom * 100) + '%';
            applyTransform();
        }

        viewportEl.addEventListener('wheel', e => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? -0.1 : 0.1;
            zoom = Math.min(Math.max(0.5, zoom + delta), 3);
            updateZoomText();
        }, { passive: false });

        viewportEl.addEventListener('mousedown', e => {
            if (e.target.closest('button') || e.target.closest('input') || e.target.closest('.click-area')) return;
            isDragging = true;
            startX = e.clientX - translateX;
            startY = e.clientY - translateY;
            viewportEl.style.cursor = 'grabbing';
        });

        window.addEventListener('mousemove', e => {
            if (!isDragging) return;
            translateX = e.clientX - startX;
            translateY = e.clientY - startY;
            applyTransform();
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
            viewportEl.style.cursor = 'default';
        });

        let touchStartX = 0, touchStartY = 0;
        function getDistance(touches) {
            return Math.hypot(touches[0].pageX - touches[1].pageX, touches[0].pageY - touches[1].pageY);
        }

        viewportEl.addEventListener('touchstart', e => {
            if (e.touches.length === 2) {
                initialPinchDistance = getDistance(e.touches);
                initialZoom = zoom;
            } else if (e.touches.length === 1) {
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
                if (zoom > 1.05) {
                    startX = e.touches[0].clientX - translateX;
                    startY = e.touches[0].clientY - translateY;
                    isDragging = true;
                }
            }
        }, { passive: false });

        viewportEl.addEventListener('touchmove', e => {
            if (e.touches.length === 2) {
                e.preventDefault();
                const currentDistance = getDistance(e.touches);
                const pinchScale = currentDistance / initialPinchDistance;
                zoom = Math.min(Math.max(0.5, initialZoom * pinchScale), 3);
                updateZoomText();
            } else if (zoom > 1.05 && isDragging && e.touches.length === 1) {
                e.preventDefault(); 
                translateX = e.touches[0].clientX - startX;
                translateY = e.touches[0].clientY - startY;
                applyTransform();
            }
        }, { passive: false });

        viewportEl.addEventListener('touchend', e => {
            if (e.touches.length < 2 && zoom <= 1.05) {
                const touchEndX = e.changedTouches[0].clientX;
                const diffX = touchEndX - touchStartX;
                const diffY = Math.abs(e.changedTouches[0].clientY - touchStartY);
                
                if (Math.abs(diffX) > 60 && diffY < 50) {
                    if (diffX > 0) prevPage();
                    else nextPage();
                }
            }
            isDragging = false;
        });

        window.addEventListener('keydown', (e) => {
            if (document.activeElement.tagName === 'INPUT') {
                if (e.key === 'Enter') goToPage();
                return; 
            }
            
            if (e.key === 'ArrowRight') nextPage();
            if (e.key === 'ArrowLeft') prevPage();
            
            if (e.key === '+' || e.key === '=' || e.code === 'NumpadAdd') zoomIn();
            if (e.key === '-' || e.key === '_' || e.code === 'NumpadSubtract') zoomOut();
        });

        init();
    </script>
</body>
</html>
