<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Particle Text Canvas - Perfect Morphing</title>
<style>
  html, body {
    height: 100%;
    margin: 0;
    background: radial-gradient(circle at 20% 20%, #111022 0%, #0d0b1a 35%, #07050a 100%);
    overflow: hidden;
    font-family: "Segoe UI", Roboto, Arial, sans-serif;
    color: #fff;
  }
  
  #canvas-container {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
  }

  #rainCanvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
    display: block;
  }

  #canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 2;
    display: block;
  }

  .overlay {
    position: absolute;
    left: 20px;
    top: 20px;
    z-index: 10;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: rgba(255, 255, 255, 0.85);
    text-shadow: 0 6px 18px rgba(0, 0, 0, 0.6);
    user-select: none;
    pointer-events: none;
    max-width: 90%; 
  }

  .overlay-content {
    pointer-events: auto;
  }

  .small {
    font-size: 16px;
    opacity: 0.85;
    margin-top: 4px;
    line-height: 1.4;
  }

  .hint {
    position: absolute;
    left: 20px;
    bottom: 20px;
    z-index: 10;
    color: rgba(255, 255, 255, 0.65);
    font-size: 14px;
    pointer-events: none;
  }

  .controls {
    margin-top: 8px;
  }

  button {
    background: linear-gradient(90deg, #ff9a9e, #fad0c4);
    border: none;
    padding: 8px 12px;
    border-radius: 8px;
    cursor: pointer;
    box-shadow: 0 6px 18px rgba(0,0,0,0.35);
    font-weight: 700;
    color: #000;
    margin-right: 8px;
    margin-bottom: 8px; 
    transition: transform 0.1s;
  }

  button:active {
    transform: translateY(1px);
  }

  @media (max-width: 600px) {
    .overlay {
      left: 15px;
      top: 15px;
    }
    .overlay-content > div:first-child {
      font-size: 18px !important; 
    }
    .small {
      font-size: 16px; 
      margin-bottom: 10px;
    }
    .hint {
      font-size: 14px;
      left: 15px;
      bottom: 15px;
    }
  }
</style>
</head>
<body>

<div class="overlay">
  <div class="overlay-content">
    <div style="font-size:24px">DLUONGTA PARTICLE TEXT</div>
    <div class="small">3 → 2 → 1 → CHÚC MỪNG SINH NHẬT → 09/01/2003 → ĐÌNH LƯƠNG TẠ</div>
    <div class="controls">
      <button id="restart">Chạy lại</button>
      <button id="toggleAccent">Chữ có dấu: BẬT</button>
    </div>
  </div>
</div>

<div id="canvas-container">
  <canvas id="rainCanvas"></canvas>
  <canvas id="canvas"></canvas>
</div>

<div class="hint">Website được tạo bởi DINH LUONG TA và sử dụng hiệu ứng Particle Text Canvas.</div>

<script>
(() => {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d', { alpha: true });
  
  const rainCanvas = document.getElementById('rainCanvas');
  const rainCtx = rainCanvas.getContext('2d', { alpha: true });
  
  let DPR = window.devicePixelRatio || 1;

  const off = document.createElement('canvas');
  const offCtx = off.getContext('2d');

  // --- CẤU HÌNH PARTICLE TEXT ---
  const particleSize = 2.2; 
  const formDuration = 1400; // Thời gian bay
  const holdDuration = 1200; // Thời gian đứng yên
  
  const textsUnaccented = ['3','2','1','CHUC', 'MUNG', 'SINH' ,'NHAT','09/01/2003','DINH LUONG TA'];
  const textsAccented = ['3','2','1','CHÚC', 'MỪNG', 'SINH', 'NHẬT','09/01/2003','ĐÌNH LƯƠNG TẠ'];
  let useAccent = false;

  let particlePool = []; 
  let particles = []; 
  let lastTime = performance.now();

  let sequence = [];
  let seqIndex = 0;
  let timelineHandle = null;
  let resizeTimeoutHandle = null;

  // --- CẤU HÌNH MƯA CODE ---
  const rainFontSize = 18;
  const rainString = "DINHLUONGTA ";
  const rainColors = ['#9370db', '#00bfff', '#ff69b4', '#ffa500'];
  let rainDrops = [];
  
  let lastRainDrawTime = 0;
  const rainUpdateInterval = 60; 

  function resize(){
    DPR = window.devicePixelRatio || 1;
    const w = window.innerWidth;
    const h = window.innerHeight;

    canvas.width = Math.floor(w * DPR);
    canvas.height = Math.floor(h * DPR);
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

    rainCanvas.width = Math.floor(w * DPR);
    rainCanvas.height = Math.floor(h * DPR);
    rainCanvas.style.width = w + 'px';
    rainCanvas.style.height = h + 'px';
    rainCtx.setTransform(DPR, 0, 0, DPR, 0, 0);

    const rainColumns = Math.floor(w / rainFontSize) + 1;
    const dropsPerColumn = 2;
    const totalDrops = rainColumns * dropsPerColumn;
    
    rainDrops = Array.from({ length: totalDrops }).map((_, index) => {
        const col = index % rainColumns;
        return {
          x: col,
          y: Math.floor(Math.random() * -60), 
          color: rainColors[Math.floor(Math.random() * rainColors.length)]
        };
    });

    clearTimeout(resizeTimeoutHandle);
    resizeTimeoutHandle = setTimeout(() => {
      buildSequence();
      const now = performance.now();
      const targets = sequence[seqIndex];
      if (targets) assignToTargets(targets, now);
    }, 150);
  }

  function easeOutCubic(t){ return 1 - Math.pow(1 - t, 3); }
  function lerp(a,b,t){ return a + (b - a) * t; }

  class Particle {
    constructor(x=0, y=0) {
      this.init(x, y);
    }

    init(x, y) {
      this.x = x;
      this.y = y;
      this.tx = x;
      this.ty = y;
      this.size = particleSize;
      this.phase = 2; 
      this.startX = x;
      this.startY = y;
      this.duration = formDuration;
      this.alpha = 1;
      this.startAlpha = 1;
      this.targetAlpha = 1;
      this.color = "#fff";
    }

    to(targetX, targetY, now, dur=formDuration, targetAlpha=1){
      this.phase = 0;
      this.startX = this.x; 
      this.startY = this.y;
      this.tx = targetX;
      this.ty = targetY;
      this.startTime = now;
      this.duration = dur;
      
      const hue = 200 + Math.random() * 140;
      this.color = `hsla(${hue}, 85%, ${45 + Math.random()*10}%, 1)`;
      
      this.startAlpha = this.alpha;
      this.targetAlpha = targetAlpha;
    }

    update(now){
      if (this.phase === 0){
        const t = Math.min(1, (now - this.startTime) / this.duration);
        const e = easeOutCubic(t);
        this.x = lerp(this.startX, this.tx, e);
        this.y = lerp(this.startY, this.ty, e);
        this.alpha = lerp(this.startAlpha, this.targetAlpha, e);
        if (t >= 1) this.phase = 2;
      } else {
        this.y += Math.sin(now/800 + this.x*0.001) * 0.02;
        this.alpha = this.targetAlpha;
      }
    }
  }

  function createOrReuseParticle(x, y){
    let p;
    if (particlePool.length > 0){
      p = particlePool.pop();
      p.init(x, y);
    } else {
      p = new Particle(x, y);
    }
    return p;
  }

  function buildTargetsForText(text, maxWidth){
    const w = Math.min(window.innerWidth, 1200);
    let fontSize;
    
    if (text.length <= 3) {
      fontSize = Math.round(w * 0.45);
    } else if (text.length >= 10) {
      fontSize = Math.round(w * 0.09);
    } else {
      fontSize = Math.round(w * 0.12);
    }
    fontSize = Math.max(24, Math.min(fontSize, 420));

    off.width = Math.floor(Math.min(maxWidth, canvas.width / DPR));
    off.height = Math.floor(Math.min(400, canvas.height / DPR));
    offCtx.clearRect(0, 0, off.width, off.height);

    offCtx.font = `bold ${fontSize}px "Segoe UI", "Roboto", Arial`;
    let textWidth = offCtx.measureText(text).width;

    const maxAllowedWidth = off.width - 20;
    if (textWidth > maxAllowedWidth) {
      fontSize = Math.floor(fontSize * (maxAllowedWidth / textWidth));
      offCtx.font = `bold ${fontSize}px "Segoe UI", "Roboto", Arial`;
    }

    offCtx.textBaseline = 'middle';
    offCtx.textAlign = 'center';
    offCtx.fillStyle = '#fff';
    
    const cx = off.width / 2;
    const cy = off.height / 2;
    offCtx.fillText(text, cx, cy);

    const img = offCtx.getImageData(0, 0, off.width, off.height);
    const data = img.data;
    const targets = [];
    
    const isMobile = window.innerWidth < 768;
    const dynamicSampleGap = isMobile ? 3 : 6;

    for (let y = 0; y < off.height; y += dynamicSampleGap){
      for (let x = 0; x < off.width; x += dynamicSampleGap){
        const idx = (y * off.width + x) * 4;
        const alpha = data[idx + 3];
        if (alpha > 120){
          const tx = (x - off.width/2) + (canvas.width / DPR) / 2;
          const ty = (y - off.height/2) + (canvas.height / DPR) / 2;
          targets.push({x: tx, y: ty});
        }
      }
    }
    return targets;
  }

  function buildSequence(){
    const arr = useAccent ? textsAccented : textsUnaccented;
    const screenPadding = window.innerWidth < 768 ? 20 : 80;
    sequence = arr.map(t => buildTargetsForText(t, Math.floor(canvas.width / DPR) - screenPadding));
    seqIndex = 0;
  }

  function initParticles(count){
    particles = [];
    for (let i = 0; i < count; i++){
      const px = Math.random() * (canvas.width / DPR);
      const py = Math.random() * (canvas.height / DPR);
      const p = createOrReuseParticle(px, py);
      p.phase = 2;
      particles.push(p);
    }
  }

  function assignToTargets(targets, now){
    // 1. Tự động sinh thêm hạt nếu chữ tiếp theo có NHIỀU ĐIỂM hơn lượng hạt hiện tại
    if (particles.length < targets.length){
      const need = targets.length - particles.length;
      for (let i = 0; i < need; i++){
        const px = Math.random() * (canvas.width / DPR);
        const py = Math.random() * (canvas.height / DPR);
        const p = createOrReuseParticle(px, py);
        p.alpha = 0; // Hạt mới sẽ mờ dần xuất hiện
        particles.push(p);
      }
    }

    const cx = (canvas.width / DPR) / 2;
    const cy = (canvas.height / DPR) / 2;

    // Sắp xếp hạt và điểm đích theo khoảng cách đến tâm để Morphing mượt không bị rối
    particles.sort((a, b) => (Math.hypot(a.x - cx, a.y - cy) - Math.hypot(b.x - cx, b.y - cy)));
    targets.sort((a, b) => (Math.hypot(a.x - cx, a.y - cy) - Math.hypot(b.x - cx, b.y - cy)));

    // 2. Phân bổ các hạt chính vào chữ mới
    for (let i = 0; i < targets.length; i++){
      const t = targets[i];
      const p = particles[i];
      p.to(t.x + (Math.random() - 0.5) * 0.5, t.y + (Math.random() - 0.5) * 0.5, now, formDuration + Math.random() * 200, 1);
    }
    
    // 3. ĐIỂM THAY ĐỔI: Phân bổ toàn bộ CÁC HẠT DƯ THỪA bay vào chữ mới
    // Bằng cách dùng lại các điểm đích của chữ mới (chia dư i % targets.length).
    // Giờ đây sẽ không có hạt nào đứng im mờ đi hay bay ra ngoài.
    for (let i = targets.length; i < particles.length; i++){
      // Lấy ngẫu nhiên lại một điểm đích trong chữ mới
      const t = targets[i % targets.length];
      const p = particles[i];
      
      // Cho biên độ bù đắp (offset) hơi lớn hơn 1 xíu để nét chữ dày hơn, hạt không đè 100% lên nhau
      p.to(t.x + (Math.random() - 0.5) * 2.5, t.y + (Math.random() - 0.5) * 2.5, now, formDuration + Math.random() * 200, 1); 
    }
  }

  function startSequence(){
    buildSequence();
    const maxCount = Math.max(...sequence.map(a => a.length));

    if (particles.length > 0) {
      particlePool.push(...particles);
      particles = [];
    }

    initParticles(Math.min(3000, maxCount + 200));
    seqIndex = 0;
    runNextStage();
  }

  function runNextStage(){
    if (!sequence.length) return;
    const now = performance.now();
    const targets = sequence[seqIndex];
    
    assignToTargets(targets, now);
    
    clearTimeout(timelineHandle);
    
    timelineHandle = setTimeout(() => {
      seqIndex++;
      if (seqIndex >= sequence.length){
        seqIndex = 0;
      }
      runNextStage();
    }, formDuration + holdDuration);
  }

  function drawRain(logicalW, logicalH, now) {
    if (now - lastRainDrawTime < rainUpdateInterval) return;
    lastRainDrawTime = now;

    rainCtx.fillStyle = 'rgba(7, 5, 10, 0.05)';
    rainCtx.fillRect(0, 0, logicalW, logicalH);

    rainCtx.font = `bold ${rainFontSize}px monospace`;
    rainCtx.textAlign = "center";

    for (let i = 0; i < rainDrops.length; i++) {
      const drop = rainDrops[i];
      
      if (drop.y >= 0) {
          const charIndex = drop.y % rainString.length;
          const text = rainString.charAt(charIndex);

          rainCtx.fillStyle = drop.color;
          rainCtx.shadowColor = drop.color;

          rainCtx.fillText(text, drop.x * rainFontSize, drop.y * rainFontSize);
          rainCtx.shadowBlur = 0;
      }

      if (drop.y * rainFontSize > logicalH) {
        drop.y = Math.floor(Math.random() * -3); 
        drop.color = rainColors[Math.floor(Math.random() * rainColors.length)];
      } else {
        drop.y++;
      }
    }
  }

  function render(now){
    const logicalW = window.innerWidth;
    const logicalH = window.innerHeight;

    drawRain(logicalW, logicalH, now);

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let i = 0; i < particles.length; i++){
      particles[i].update(now);
    }

    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (let i = 0; i < particles.length; i++){
      const p = particles[i];
      if (p.alpha <= 0) continue; 
      ctx.globalAlpha = Math.min(0.9, p.alpha * 0.9);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * 2.8, 0, Math.PI*2);
      ctx.fill();
    }
    
    for (let i = 0; i < particles.length; i++){
      const p = particles[i];
      if (p.alpha <= 0) continue;
      ctx.globalAlpha = Math.min(1, p.alpha);
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(p.x, p.y, Math.max(0.9, p.size * 0.9), 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();

    requestAnimationFrame(render);
  }

  document.getElementById('restart').addEventListener('click', () => {
    clearTimeout(timelineHandle);
    startSequence();
  });

  const taBtn = document.getElementById('toggleAccent');
  taBtn.addEventListener('click', () => {
    useAccent = !useAccent;
    taBtn.textContent = 'Chữ có dấu: ' + (useAccent ? 'TẮT' : 'BẬT');
    clearTimeout(timelineHandle);
    startSequence();
  });

  window.addEventListener('resize', resize);
  resize();
  startSequence();
  requestAnimationFrame(render);

})();
</script>
</body>
</html>
